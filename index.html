      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
      }
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 10px;
      }
      .drag-over {
        background-color: #f0fdf4 !important;
        border: 2px dashed #22c55e !important;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.25s ease-out forwards;
      }
    </style>
  </head>

      // --- SVG ICONS PACK ---

      // --- MAIN EXECUTABLE APP ---
      function App() {
        // Core States
        const [auth, setAuth] = useState(
          () =>
            JSON.parse(localStorage.getItem("rs_auth")) || {
              loggedIn: false,
              role: "Admin",
            },
        );
        const [activeTab, setActiveTab] = useState("dashboard");
        const [jobs, setJobs] = useState(
          () => JSON.parse(localStorage.getItem("rs_jobs")) || initialJobs,
        );
        const [candidates, setCandidates] = useState(
          () =>
            JSON.parse(localStorage.getItem("rs_candidates")) ||
            initialCandidates,
        );
        const [interviews, setInterviews] = useState(
          () =>
            JSON.parse(localStorage.getItem("rs_interviews")) ||
            initialInterviews,
        );
        const [activities, setActivities] = useState(
          () =>
            JSON.parse(localStorage.getItem("rs_activities")) ||
            initialActivities,
        );
        const [toasts, setToasts] = useState([]);

        // Modal Controls
        const [jobModal, setJobModal] = useState({
          open: false,
          mode: "add",
          data: null,
        });
        const [candModal, setCandModal] = useState({ open: false, data: null });
        const [schedModal, setSchedModal] = useState({
          open: false,
          candidate: null,
        });

        // Synchronize with LocalStorage
        useEffect(() => {
          localStorage.setItem("rs_auth", JSON.stringify(auth));
        }, [auth]);
        useEffect(() => {
          localStorage.setItem("rs_jobs", JSON.stringify(jobs));
        }, [jobs]);
        useEffect(() => {
          localStorage.setItem("rs_candidates", JSON.stringify(candidates));
        }, [candidates]);
        useEffect(() => {
          localStorage.setItem("rs_interviews", JSON.stringify(interviews));
        }, [interviews]);
        useEffect(() => {
          localStorage.setItem("rs_activities", JSON.stringify(activities));
        }, [activities]);

        // Toast System Trigger
        const triggerToast = (message) => {
          const id = Date.now();
          setToasts((prev) => [...prev, { id, message }]);
          setTimeout(
            () => setToasts((prev) => prev.filter((t) => t.id !== id)),
            3000,
          );
        };

        const addActivity = (text, type = "candidate") => {
          const newAct = { id: Date.now(), text, timestamp: "Baru saja", type };
          setActivities((prev) => [newAct, ...prev.slice(0, 15)]);
        };

        if (!auth.loggedIn) {
          return (
            <LoginPage
              onLogin={(role) => {
                setAuth({ loggedIn: true, role });
                triggerToast(`Selamat datang! Anda masuk sebagai ${role}`);
              }}
            />
          );
        }

        return (
          <div className="flex h-screen overflow-hidden bg-slate-50 text-slate-900">
            {/* SIDEBAR COMPONENT */}
            <aside className="w-64 bg-slate-900 text-white flex flex-col shadow-2xl z-20">
              <div className="p-6 border-b border-slate-800 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-600/30">
                    R
                  </div>
                  <h1 className="text-xl font-bold tracking-tight">
                    RecruitSync<span className="text-indigo-400">.</span>
                  </h1>
                </div>
              </div>

              {/* Navigation Tabs */}
              <nav className="flex-1 px-4 space-y-1.5 mt-6">
                <SidebarItem
                  active={activeTab === "dashboard"}
                  onClick={() => setActiveTab("dashboard")}
                  icon={<Icons.Layout />}
                  label="Dashboard"
                />
                {auth.role === "Admin" && (
                  <>
                    <SidebarItem
                      active={activeTab === "jobs"}
                      onClick={() => setActiveTab("jobs")}
                      icon={<Icons.Briefcase />}
                      label="Job Management"
                    />
                    <SidebarItem
                      active={activeTab === "pipeline"}
                      onClick={() => setActiveTab("pipeline")}
                      icon={<Icons.Users />}
                      label="Candidate Pipeline"
                    />
                  </>
                )}
                <SidebarItem
                  active={activeTab === "scheduler"}
                  onClick={() => setActiveTab("scheduler")}
                  icon={<Icons.Calendar />}
                  label="Interview Scheduler"
                />
                {auth.role === "Interviewer" && (
                  <SidebarItem
                    active={activeTab === "careers"}
                    onClick={() => setActiveTab("careers")}
                    icon={<Icons.Globe />}
                    label="Public Job Board"
                  />
                )}
              </nav>

              {/* User Profile & Role Switcher */}
              <div className="p-4 border-t border-slate-800 bg-slate-950/40">
                <div className="flex items-center justify-between mb-3 text-xs text-slate-400">
                  <span className="flex items-center gap-1">
                    <Icons.Shield /> Role: <strong>{auth.role}</strong>
                  </span>
                  <button
                    onClick={() => {
                      const nextRole =
                        auth.role === "Admin" ? "Interviewer" : "Admin";
                      setAuth((p) => ({ ...p, role: nextRole }));

                      // Jika berubah menjadi Interviewer, tendang dari tab khusus Admin (jobs, pipeline)
                      if (
                        nextRole === "Interviewer" &&
                        ["jobs", "pipeline"].includes(activeTab)
                      ) {
                        setActiveTab("dashboard");
                      }

                      // Jika berubah menjadi Admin, tendang dari tab khusus Interviewer (careers)
                      if (nextRole === "Admin" && activeTab === "careers") {
                        setActiveTab("dashboard");
                      }

                      triggerToast(`Role dialihkan ke ${nextRole}`);
                    }}
                    className="text-indigo-400 hover:underline hover:text-indigo-300 font-medium"
                  >
                    Ubah
                  </button>
                </div>
                <div className="bg-slate-800/80 rounded-xl p-3 flex items-center gap-3 mb-3">
                  <div className="w-9 h-9 rounded-full bg-indigo-500 flex items-center justify-center font-bold text-sm text-white">
                    WF
                  </div>
                  <div className="overflow-hidden">
                    <p className="text-xs font-semibold truncate text-slate-200">
                      Mochamad Rifki Ramadhan
                    </p>
                    <p className="text-[10px] text-slate-400 truncate">
                      mrifkiri@gmail.com
                    </p>
                  </div>
                </div>
                <button
                  onClick={() => {
                    setAuth({ loggedIn: false, role: "Admin" });
                  }}
                  className="w-full flex items-center justify-center gap-2 px-4 py-2 text-xs text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all"
                >
                  <Icons.LogOut /> Logout
                </button>
              </div>
            </aside>

            {/* MAIN PAGE PLATFORM CONTAINER */}
            <main className="flex-1 flex flex-col h-screen overflow-hidden">
              {/* Main Header bar */}
              <header className="h-16 glass-effect border-b border-slate-200/80 flex items-center justify-between px-8 z-10 sticky top-0">
                <div className="flex items-center gap-3">
                  <h2 className="text-lg font-bold text-slate-800 capitalize tracking-tight">
                    {activeTab === "careers" ? "Public Job Board" : activeTab}
                  </h2>
                </div>
                <div className="text-sm text-slate-500 font-medium bg-slate-100 px-3.5 py-1.5 rounded-full shadow-inner">
                  May 30, 2026
                </div>
              </header>

              {/* Component Tab View Router */}
              <div className="flex-1 overflow-y-auto p-8 custom-scroll">
                {activeTab === "dashboard" && (
                  <DashboardTab
                    jobs={jobs}
                    candidates={candidates}
                    interviews={interviews}
                    activities={activities}
                    role={auth.role}
                  />
                )}
                {activeTab === "jobs" && auth.role === "Admin" && (
                  <JobManagementTab
                    jobs={jobs}
                    setJobs={setJobs}
                    role={auth.role}
                    setJobModal={setJobModal}
                    triggerToast={triggerToast}
                    addActivity={addActivity}
                  />
                )}
                {activeTab === "pipeline" && auth.role === "Admin" && (
                  <PipelineTab
                    candidates={candidates}
                    setCandidates={setCandidates}
                    jobs={jobs}
                    setCandModal={setCandModal}
                    setSchedModal={setSchedModal}
                    triggerToast={triggerToast}
                    addActivity={addActivity}
                  />
                )}
                {activeTab === "scheduler" && (
                  <SchedulerTab
                    interviews={interviews}
                    setInterviews={setInterviews}
                    candidates={candidates}
                    triggerToast={triggerToast}
                    role={auth.role} /* Props role ditambahkan di sini */
                  />
                )}
                {activeTab === "careers" && auth.role === "Interviewer" && (
                  <CareersBoardTab
                    jobs={jobs}
                    candidates={candidates}
                    setCandidates={setCandidates}
                    triggerToast={triggerToast}
                    addActivity={addActivity}
                  />
                )}
              </div>
            </main>

            {/* --- MODAL RENDERS HUB --- */}
            {jobModal.open && (
              <JobFormModal
                modal={jobModal}
                setJobModal={setJobModal}
                jobs={jobs}
                setJobs={setJobs}
                triggerToast={triggerToast}
                addActivity={addActivity}
              />
            )}
            {candModal.open && (
              <CandidateDetailModal
                modal={candModal}
                setCandModal={setCandModal}
                candidates={candidates}
                setCandidates={setCandidates}
                setSchedModal={setSchedModal}
                triggerToast={triggerToast}
              />
            )}
            {schedModal.open && (
              <ScheduleInterviewModal
                modal={schedModal}
                setSchedModal={setSchedModal}
                interviews={interviews}
                setInterviews={setInterviews}
                triggerToast={triggerToast}
              />
            )}

            {/* Toast Notification Container */}
            <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2">
              {toasts.map((t) => (
                <div
                  key={t.id}
                  className="animate-fade-in flex items-center gap-3 bg-slate-900 text-white px-5 py-3.5 rounded-xl shadow-2xl border border-slate-700/50"
                >
                  <div className="w-5 h-5 rounded-full bg-emerald-500 flex items-center justify-center text-white font-bold text-xs">
                    ✓
                  </div>
                  <p className="text-xs font-semibold tracking-wide">
                    {t.message}
                  </p>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // ==========================================
      // 1. LOGIN PAGE COMPONENT (DUMMY AUTH)
      // ==========================================
      function LoginPage({ onLogin }) {
        const [email, setEmail] = useState("admin@recruitsync.com");
        const [password, setPassword] = useState("password123");
        const [role, setRole] = useState("Admin");
        const [isLoading, setIsLoading] = useState(false);

        const handleFormSubmit = (e) => {
          e.preventDefault();
          setIsLoading(true);
          setTimeout(() => {
            setIsLoading(false);
            onLogin(role);
          }, 800);
        };

        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-900 relative p-4 overflow-hidden">
            <div className="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[120px]"></div>
            <div className="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-emerald-600/10 rounded-full blur-[120px]"></div>

            <div className="bg-white/95 rounded-2xl shadow-2xl border border-slate-100 max-w-md w-full p-10 z-10 backdrop-blur-md">
              <div className="text-center mb-8">
                <div className="w-12 h-12 bg-indigo-600 text-white rounded-xl flex items-center justify-center font-bold text-2xl mx-auto shadow-xl shadow-indigo-600/20 mb-4">
                  R
                </div>
                <h2 className="text-2xl font-bold text-slate-900 tracking-tight">
                  RecruitSync ATS Portal
                </h2>
                <p className="text-slate-500 text-xs mt-1.5 font-medium">
                  Sistem Pelacakan Pelamar & Rekrutmen Enterprise
                </p>
              </div>

              <form onSubmit={handleFormSubmit} className="space-y-4">
                <div>
                  <label className="block text-xs font-semibold text-slate-700 mb-1.5">
                    Email
                  </label>
                  <input
                    type="email"
                    required
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all font-medium"
                  />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-700 mb-1.5">
                    Kata Sandi
                  </label>
                  <input
                    type="password"
                    required
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all font-medium"
                  />
                </div>

                <button
                  type="submit"
                  disabled={isLoading}
                  className="w-full bg-slate-900 hover:bg-slate-800 text-white text-sm font-bold py-3 rounded-xl transition-all shadow-lg flex justify-center items-center gap-2 mt-2"
                >
                  {isLoading ? (
                    <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                  ) : (
                    "Masuk ke Dashboard"
                  )}
                </button>
              </form>

              <div className="mt-6 pt-5 border-t border-slate-100 text-center">
                <span className="text-[10px] text-slate-400 bg-slate-50 px-3 py-1.5 rounded-md font-medium">
                  Dummy Auth Mode: Pengisian bebas diperbolehkan.
                </span>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 2. DASHBOARD TAB OVERVIEW
      // ==========================================
      function DashboardTab({
        jobs,
        candidates,
        interviews,
        activities,
        role,
      }) {
        const metrics = useMemo(() => {
          const activeJ = jobs.filter((j) => j.status === "Active").length;
          const totalC = candidates.length;
          const hiredC = candidates.filter((c) => c.stage === "Hired").length;
          const interviewC = candidates.filter(
            (c) => c.stage === "Interview",
          ).length;
          const conversion = totalC ? Math.round((hiredC / totalC) * 100) : 0;
          return { activeJ, totalC, hiredC, interviewC, conversion };
        }, [jobs, candidates]);

        // Jika Interviewer, filter jadwal hanya untuk jadwal yang berstatus Scheduled
        const interviewerSchedule = useMemo(() => {
          return interviews.filter((i) => i.status === "Scheduled");
        }, [interviews]);

        return (
          <div className="space-y-8 animate-fade-in">
            {/* Jika Admin, tampilkan metrik penuh. Jika Interviewer, tampilkan kartu sapaan sederhana */}
            {role === "Admin" ? (
              <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                <StatCard
                  title="Pekerjaan Aktif"
                  value={metrics.activeJ}
                  desc="Lowongan dibuka publik"
                  color="border-l-4 border-blue-500"
                />
                <StatCard
                  title="Total Kandidat"
                  value={metrics.totalC}
                  desc="Pelamar terdaftar di sistem"
                  color="border-l-4 border-indigo-500"
                />
                <StatCard
                  title="Proses Interview"
                  value={metrics.interviewC}
                  desc="Tahap evaluasi aktif"
                  color="border-l-4 border-amber-500"
                />
                <StatCard
                  title="Rasio Kelulusan"
                  value={`${metrics.conversion}%`}
                  desc="Dari total pendaftaran masuk"
                  color="border-l-4 border-emerald-500"
                />
              </div>
            ) : (
              <div className="bg-indigo-900 p-8 rounded-2xl shadow-sm border border-slate-200 text-white">
                <h2 className="text-2xl font-bold mb-2">
                  Halo, Interviewer! 👋
                </h2>
                <p className="text-indigo-200 text-sm">
                  Selamat datang di portal RecruitSync. Silakan periksa jadwal
                  wawancara Anda untuk hari ini.
                </p>
              </div>
            )}

            <div
              className={`grid grid-cols-1 ${role === "Admin" ? "lg:grid-cols-3" : "lg:grid-cols-1"} gap-6`}
            >
              {/* Analitik Pipeline hanya untuk Admin */}
              {role === "Admin" && (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
                  <div>
                    <h3 className="text-sm font-bold text-slate-900 tracking-tight mb-1">
                      Analitik Konversi Pipeline
                    </h3>
                    <p className="text-xs text-slate-400 font-medium mb-6">
                      Metrik kelulusan kandidat di setiap gerbang
                    </p>
                  </div>
                  <div className="space-y-4">
                    {/* Progress bar logic (Sama seperti sebelumnya) */}
                    <div>
                      <div className="flex justify-between text-xs font-semibold mb-1.5">
                        <span className="text-slate-600">
                          Applied (Pendaftaran Baru)
                        </span>
                        <span className="text-slate-900">
                          {
                            candidates.filter((c) => c.stage === "Applied")
                              .length
                          }{" "}
                          Pelamar
                        </span>
                      </div>
                      <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div
                          className="bg-blue-500 h-full rounded-full"
                          style={{ width: "100%" }}
                        ></div>
                      </div>
                    </div>
                    <div>
                      <div className="flex justify-between text-xs font-semibold mb-1.5">
                        <span className="text-slate-600">
                          Interview (Wawancara)
                        </span>
                        <span className="text-slate-900">
                          {metrics.interviewC} Pelamar
                        </span>
                      </div>
                      <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div
                          className="bg-amber-500 h-full rounded-full"
                          style={{
                            width: `${(metrics.interviewC / metrics.totalC) * 100 || 0}%`,
                          }}
                        ></div>
                      </div>
                    </div>
                    <div>
                      <div className="flex justify-between text-xs font-semibold mb-1.5">
                        <span className="text-slate-600">
                          Hired (Berhasil Diterima)
                        </span>
                        <span className="text-slate-900">
                          {metrics.hiredC} Anggota Baru
                        </span>
                      </div>
                      <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div
                          className="bg-emerald-500 h-full rounded-full"
                          style={{ width: `${metrics.conversion}%` }}
                        ></div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* Jadwal Wawancara (Ditampilkan untuk Admin dan Interviewer) */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 className="text-sm font-bold text-slate-900 tracking-tight mb-1">
                  {role === "Admin"
                    ? "Interview Mendatang"
                    : "Agenda Wawancara Anda"}
                </h3>
                <p className="text-xs text-slate-400 font-medium mb-4">
                  Agenda terdekat untuk tim penilai
                </p>
                <div className="space-y-3 max-h-[220px] overflow-y-auto custom-scroll pr-1">
                  {(role === "Admin" ? interviews : interviewerSchedule)
                    .length === 0 ? (
                    <p className="text-xs text-slate-400 text-center py-8">
                      Tidak ada jadwal terdekat.
                    </p>
                  ) : (
                    (role === "Admin" ? interviews : interviewerSchedule).map(
                      (i) => (
                        <div
                          key={i.id}
                          className="p-3 bg-slate-50 rounded-xl border border-slate-100 flex flex-col gap-1"
                        >
                          <div className="flex justify-between items-center">
                            <span className="text-xs font-bold text-slate-800">
                              {i.candidateName}
                            </span>
                            <span className="text-[10px] bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-md font-bold">
                              {i.time}
                            </span>
                          </div>
                          <p className="text-[11px] text-slate-500 font-medium">
                            {i.jobTitle} • {i.interviewer}
                          </p>
                          <div className="text-[10px] text-slate-400 flex items-center gap-1 mt-1 font-semibold">
                            <span>📅 {i.date}</span>
                            <span className="ml-auto text-amber-600">
                              ● {i.status}
                            </span>
                          </div>
                        </div>
                      ),
                    )
                  )}
                </div>
              </div>

              {/* Aktivitas Log HR Hanya untuk Admin */}
              {role === "Admin" && (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h3 className="text-sm font-bold text-slate-900 tracking-tight mb-1">
                    Aktivitas Terbaru
                  </h3>
                  <p className="text-xs text-slate-400 font-medium mb-4">
                    Log jejak operasional rekrutmen
                  </p>
                  <div className="space-y-3.5 max-h-[220px] overflow-y-auto custom-scroll pr-1">
                    {activities.map((act) => (
                      <div
                        key={act.id}
                        className="flex gap-3 text-xs items-start"
                      >
                        <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full mt-1.5 shrink-0"></div>
                        <div className="flex-1">
                          <p className="text-slate-700 font-medium leading-relaxed">
                            {act.text}
                          </p>
                          <span className="text-[10px] text-slate-400 font-semibold">
                            {act.timestamp}
                          </span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // Helper StatCard Dashboard
      function StatCard({ title, value, desc, color }) {
        return (
          <div
            className={`bg-white p-5 rounded-2xl shadow-sm border border-slate-200/80 ${color}`}
          >
            <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">
              {title}
            </p>
            <p className="text-3xl font-extrabold text-slate-900 mt-2 tracking-tight">
              {value}
            </p>
            <p className="text-xs text-slate-500 font-medium mt-1.5">{desc}</p>
          </div>
        );
      }

      // ==========================================
      // 3. JOB MANAGEMENT TAB (COMPREHENSIVE ACTION)
      // ==========================================
      function JobManagementTab({
        jobs,
        setJobs,
        role,
        setJobModal,
        triggerToast,
        addActivity,
      }) {
        const [searchQuery, setSearchQuery] = useState("");
        const [statusFilter, setStatusFilter] = useState("All");
        const [deptFilter, setDeptFilter] = useState("All");
        const [sortBy, setSortBy] = useState("newest");

        // Filter Departments uniquely
        const departments = useMemo(() => {
          return ["All", ...new Set(jobs.map((j) => j.department))];
        }, [jobs]);

        const processJobs = useMemo(() => {
          let result = jobs.filter((j) => {
            const matchesSearch = j.title
              .toLowerCase()
              .includes(searchQuery.toLowerCase());
            const matchesStatus =
              statusFilter === "All" || j.status === statusFilter;
            const matchesDept =
              deptFilter === "All" || j.department === deptFilter;
            return matchesSearch && matchesStatus && matchesDept;
          });

          if (sortBy === "newest") result.sort((a, b) => b.id - a.id);
          if (sortBy === "oldest") result.sort((a, b) => a.id - b.id);
          if (sortBy === "applicants")
            result.sort((a, b) => b.applicants - a.applicants);

          return result;
        }, [jobs, searchQuery, statusFilter, deptFilter, sortBy]);

        const handleDeleteJob = (id, title) => {
          if (role !== "Admin") {
            alert(
              "Aksi Ditolak: Hanya akun dengan peran Admin yang dapat menghapus pekerjaan!",
            );
            return;
          }
          if (
            confirm(
              `Apakah Anda yakin ingin menghapus lowongan kerja "${title}"? Tindakan ini permanen.`,
            )
          ) {
            setJobs((prev) => prev.filter((j) => j.id !== id));
            triggerToast(`Lowongan ${title} berhasil dihapus.`);
            addActivity(
              `Lowongan pekerjaan "${title}" dihapus permanen oleh Admin`,
              "job",
            );
          }
        };

        return (
          <div className="space-y-6 animate-fade-in">
            {/* Controls Bar */}
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center justify-between">
              <div className="flex flex-wrap gap-3 items-center flex-1 max-w-4xl">
                <div className="relative w-64">
                  <span className="absolute inset-y-0 left-3 flex items-center text-slate-400">
                    <Icons.Search />
                  </span>
                  <input
                    type="text"
                    placeholder="Cari judul pekerjaan..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="pl-9 pr-4 py-2 w-full bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all font-medium"
                  />
                </div>

                <select
                  value={statusFilter}
                  onChange={(e) => setStatusFilter(e.target.value)}
                  className="bg-slate-50 border border-slate-200 text-xs font-bold p-2 rounded-xl outline-none focus:bg-white"
                >
                  <option value="All">Semua Status</option>
                  <option value="Active">Aktif</option>
                  <option value="Closed">Tutup</option>
                </select>

                <select
                  value={deptFilter}
                  onChange={(e) => setDeptFilter(e.target.value)}
                  className="bg-slate-50 border border-slate-200 text-xs font-bold p-2 rounded-xl outline-none focus:bg-white"
                >
                  {departments.map((d) => (
                    <option key={d} value={d}>
                      {d === "All" ? "Semua Departemen" : d}
                    </option>
                  ))}
                </select>

                <select
                  value={sortBy}
                  onChange={(e) => setSortBy(e.target.value)}
                  className="bg-slate-50 border border-slate-200 text-xs font-bold p-2 rounded-xl outline-none focus:bg-white"
                >
                  <option value="newest">Terbaru</option>
                  <option value="oldest">Terlawas</option>
                  <option value="applicants">Pelamar Terbanyak</option>
                </select>
              </div>

              <button
                onClick={() => {
                  if (role !== "Admin") {
                    alert(
                      "Aksi Ditolak: Hanya Admin yang dapat mempublikasikan lowongan baru!",
                    );
                    return;
                  }
                  setJobModal({ open: true, mode: "add", data: null });
                }}
                className={`text-xs font-bold text-white px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-md transition-all ${role === "Admin" ? "bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/10" : "bg-slate-400 cursor-not-allowed"}`}
              >
                <Icons.Plus /> Buka Lowongan Baru
              </button>
            </div>

            {/* Job List Table Container */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-200 text-[10px] uppercase text-slate-400 font-bold tracking-wider">
                      <th className="p-4 pl-6">Detail Pekerjaan</th>
                      <th className="p-4">Departemen</th>
                      <th className="p-4">Tipe & Lokasi</th>
                      <th className="p-4">Ekspektasi Gaji</th>
                      <th className="p-4">Status</th>
                      <th className="p-4 text-center">Total Pelamar</th>
                      <th className="p-4 pr-6 text-right">Aksi Kelola</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-xs font-medium text-slate-700">
                    {processJobs.length === 0 ? (
                      <tr>
                        <td
                          colSpan="7"
                          className="p-10 text-center text-slate-400"
                        >
                          Tidak ada lowongan ditemukan sesuai filter.
                        </td>
                      </tr>
                    ) : (
                      processJobs.map((job) => (
                        <tr
                          key={job.id}
                          className="hover:bg-slate-50/60 transition-colors"
                        >
                          <td className="p-4 pl-6">
                            <p className="font-bold text-slate-900 text-sm">
                              {job.title}
                            </p>
                            <p className="text-[10px] text-slate-400 font-semibold mt-0.5">
                              ID: JOB-{job.id} • Dibuka {job.date}
                            </p>
                          </td>
                          <td className="p-4 text-slate-600">
                            {job.department}
                          </td>
                          <td className="p-4">
                            <p className="text-slate-800 font-semibold">
                              {job.type}
                            </p>
                            <p className="text-[10px] text-slate-400 font-semibold mt-0.5">
                              {job.location}
                            </p>
                          </td>
                          <td className="p-4 text-slate-600">{job.salary}</td>
                          <td className="p-4">
                            <span
                              className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold border ${job.status === "Active" ? "bg-emerald-50 text-emerald-700 border-emerald-200" : "bg-slate-100 text-slate-600 border-slate-200"}`}
                            >
                              {job.status === "Active" ? "Aktif" : "Tutup"}
                            </span>
                          </td>
                          <td className="p-4 text-center font-bold text-slate-900 text-sm bg-slate-50/40">
                            {job.applicants}
                          </td>
                          <td className="p-4 pr-6 text-right">
                            <div className="inline-flex gap-1.5">
                              <button
                                onClick={() => {
                                  if (role !== "Admin") {
                                    alert(
                                      "Aksi Ditolak: Hanya Admin yang dapat mengedit lowongan!",
                                    );
                                    return;
                                  }
                                  setJobModal({
                                    open: true,
                                    mode: "edit",
                                    data: job,
                                  });
                                }}
                                className="p-1.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all"
                                title="Edit Lowongan"
                              >
                                <Icons.Pencil />
                              </button>
                              <button
                                onClick={() =>
                                  handleDeleteJob(job.id, job.title)
                                }
                                className="p-1.5 text-slate-500 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-all"
                                title="Hapus Lowongan"
                              >
                                <Icons.Trash />
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 4. CANDIDATE PIPELINE KANBAN (DRAG AND DROP)
      // ==========================================
      function PipelineTab({
        candidates,
        setCandidates,
        jobs,
        setCandModal,
        setSchedModal,
        triggerToast,
        addActivity,
      }) {
        const stages = ["Applied", "Interview", "Hired"];
        const [selectedJobId, setSelectedJobId] = useState("All");
        const [draggedCandId, setDraggedCandId] = useState(null);

        // Filtering candidates based on Job Opening selected
        const filteredCandidates = useMemo(() => {
          if (selectedJobId === "All") return candidates;
          return candidates.filter((c) => c.jobId === Number(selectedJobId));
        }, [candidates, selectedJobId]);

        // Drag And Drop Handlers
        const onDragStart = (e, id) => {
          setDraggedCandId(id);
          e.dataTransfer.effectAllowed = "move";
          e.target.style.opacity = "0.4";
        };

        const onDragEnd = (e) => {
          e.target.style.opacity = "1";
          setDraggedCandId(null);
          document
            .querySelectorAll(".kanban-column-zone")
            .forEach((el) => el.classList.remove("drag-over"));
        };

        const onDragOver = (e) => {
          e.preventDefault();
          e.currentTarget.classList.add("drag-over");
        };

        const onDragLeave = (e) => {
          e.currentTarget.classList.remove("drag-over");
        };

        const onDrop = (e, targetStage) => {
          e.preventDefault();
          e.currentTarget.classList.remove("drag-over");
          if (!draggedCandId) return;

          const candidate = candidates.find((c) => c.id === draggedCandId);
          if (candidate && candidate.stage !== targetStage) {
            // Automated Trigger: simulate email trigger context window popup logic
            const updated = candidates.map((c) =>
              c.id === draggedCandId ? { ...c, stage: targetStage } : c,
            );
            setCandidates(updated);
            triggerToast(
              `Status ${candidate.name} diperbarui ke ${targetStage}`,
            );
            addActivity(
              `Kandidat ${candidate.name} dipindahkan ke gerbang tahap "${targetStage}"`,
              "candidate",
            );
          }
        };

        return (
          <div className="space-y-6 h-full flex flex-col animate-fade-in">
            {/* Header Filtering bar */}
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between flex-wrap gap-4">
              <div>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">
                  Saring Pipeline Lowongan
                </p>
                <select
                  value={selectedJobId}
                  onChange={(e) => setSelectedJobId(e.target.value)}
                  className="bg-slate-50 border border-slate-200 text-xs font-bold p-2 rounded-xl mt-1.5 outline-none focus:bg-white w-64"
                >
                  <option value="All">Semua Pekerjaan Terbuka</option>
                  {jobs.map((j) => (
                    <option key={j.id} value={j.id}>
                      {j.title}
                    </option>
                  ))}
                </select>
              </div>
              <div className="text-right text-xs font-medium text-slate-400">
                💡{" "}
                <em>
                  Tips: Tahan dan seret kartu kandidat untuk memindahkan tahapan
                  seleksi.
                </em>
              </div>
            </div>

            {/* Kanban Columns Flexboard wrapper */}
            <div className="flex gap-6 flex-1 overflow-x-auto pb-4 custom-scroll items-start">
              {stages.map((stage) => {
                const list = filteredCandidates.filter(
                  (c) => c.stage === stage,
                );
                return (
                  <div
                    key={stage}
                    className="kanban-column-zone flex-1 min-w-[320px] max-w-[400px] bg-slate-100/70 border border-slate-200 rounded-2xl flex flex-col transition-all duration-200"
                    onDragOver={onDragOver}
                    onDragLeave={onDragLeave}
                    onDrop={(e) => onDrop(e, stage)}
                  >
                    {/* Stage Title Header */}
                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-white/50 rounded-t-2xl">
                      <h4 className="font-bold text-xs tracking-wide text-slate-700 uppercase flex items-center gap-2">
                        {stage === "Applied" && (
                          <div className="w-2 h-2 rounded-full bg-blue-500 shadow-sm"></div>
                        )}
                        {stage === "Interview" && (
                          <div className="w-2 h-2 rounded-full bg-amber-500 shadow-sm"></div>
                        )}
                        {stage === "Hired" && (
                          <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-sm"></div>
                        )}
                        {stage === "Applied"
                          ? "Pendaftaran (Applied)"
                          : stage === "Interview"
                            ? "Wawancara (Interview)"
                            : "Diterima (Hired)"}
                      </h4>
                      <span className="bg-white border text-slate-800 font-extrabold text-xs px-2.5 py-0.5 rounded-full shadow-sm">
                        {list.length}
                      </span>
                    </div>

                    {/* Scrollable Container Cards Area */}
                    <div className="p-4 flex-1 overflow-y-auto custom-scroll space-y-3 min-h-[450px]">
                      {list.map((cand) => (
                        <div
                          key={cand.id}
                          draggable
                          onDragStart={(e) => onDragStart(e, cand.id)}
                          onDragEnd={onDragEnd}
                          onClick={() =>
                            setCandModal({ open: true, data: cand })
                          }
                          className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-400 transition-all cursor-grab active:cursor-grabbing group animate-fade-in"
                        >
                          <div className="flex items-center gap-3 mb-3">
                            <div className="w-9 h-9 rounded-full bg-indigo-50 text-indigo-700 font-bold text-xs flex items-center justify-center">
                              {cand.avatar}
                            </div>
                            <div className="overflow-hidden">
                              <h5 className="font-bold text-slate-900 text-xs truncate group-hover:text-indigo-600 transition-colors">
                                {cand.name}
                              </h5>
                              <p className="text-[10px] text-slate-400 font-semibold truncate mt-0.5">
                                {cand.role}
                              </p>
                            </div>
                          </div>

                          <div className="space-y-1.5 text-[10px] text-slate-500 font-medium pt-2 border-t border-slate-100">
                            <p className="truncate flex items-center gap-1.5">
                              ✉️ {cand.email}
                            </p>
                            <p className="flex items-center gap-1.5">
                              📅 Masuk: {cand.appliedDate}
                            </p>
                          </div>

                          {/* Interactive quick action overlay helper inside card */}
                          <div className="mt-3 pt-2.5 border-t border-slate-100 flex gap-2 justify-end">
                            {stage === "Interview" && (
                              <button
                                onClick={(e) => {
                                  e.stopPropagation();
                                  setSchedModal({
                                    open: true,
                                    candidate: cand,
                                  });
                                }}
                                className="bg-amber-50 hover:bg-amber-100 text-amber-800 text-[9px] font-bold px-2 py-1 rounded-md border border-amber-200 transition-all"
                              >
                                🗓 Atur Jadwal
                              </button>
                            )}
                            <span className="text-[9px] text-slate-400 font-bold ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                              Klik Detail →
                            </span>
                          </div>
                        </div>
                      ))}

                      {list.length === 0 && (
                        <div className="text-center p-8 text-xs font-semibold text-slate-400 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/40">
                          Letakkan kandidat di sini
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // ==========================================
      // 5. INTERVIEW SCHEDULER TAB
      // ==========================================
      function SchedulerTab({
        interviews,
        setInterviews,
        candidates,
        triggerToast,
        role, // Tambahkan penerimaan props role
      }) {
        const handleCancelInterview = (id, candName) => {
          if (role !== "Admin") return; // Lapis keamanan tambahan
          if (
            confirm(
              `Apakah Anda yakin ingin membatalkan jadwal interview untuk ${candName}?`,
            )
          ) {
            setInterviews((prev) => prev.filter((i) => i.id !== id));
            triggerToast(`Jadwal interview ${candName} dibatalkan.`);
          }
        };

        const handleMarkCompleted = (id) => {
          if (role !== "Admin") return; // Lapis keamanan tambahan
          setInterviews((prev) =>
            prev.map((i) => (i.id === id ? { ...i, status: "Completed" } : i)),
          );
          triggerToast("Status interview diperbarui ke Selesai.");
        };

        // Interviewer hanya melihat jadwal yang statusnya 'Scheduled' (aktif)
        const displayInterviews = useMemo(() => {
          return role === "Admin"
            ? interviews
            : interviews.filter((i) => i.status === "Scheduled");
        }, [interviews, role]);

        return (
          <div className="space-y-6 animate-fade-in">
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wider mb-4">
                {role === "Admin"
                  ? "Agenda Wawancara Aktif Terjadwal"
                  : "Daftar Wawancara Anda"}
              </h3>

              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse text-xs">
                  <thead>
                    <tr className="bg-slate-50 text-slate-400 font-bold border-b border-slate-200 uppercase text-[10px]">
                      <th className="p-4 pl-5">Nama Kandidat</th>
                      <th className="p-4">Lowongan Kerja</th>
                      <th className="p-4">Tanggal & Waktu</th>
                      <th className="p-4">Pewawancara</th>
                      <th className="p-4">Format</th>
                      <th className="p-4">Status</th>
                      {/* Kolom aksi hanya dirender untuk Admin */}
                      {role === "Admin" && (
                        <th className="p-4 pr-5 text-right">Tindakan</th>
                      )}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                    {displayInterviews.length === 0 ? (
                      <tr>
                        <td
                          colSpan={role === "Admin" ? "7" : "6"}
                          className="p-8 text-center text-slate-400"
                        >
                          Belum ada agenda wawancara terbuat.
                        </td>
                      </tr>
                    ) : (
                      displayInterviews.map((inv) => (
                        <tr
                          key={inv.id}
                          className="hover:bg-slate-50/50 transition-colors"
                        >
                          <td className="p-4 pl-5 font-bold text-slate-900">
                            {inv.candidateName}
                          </td>
                          <td className="p-4 text-slate-600">{inv.jobTitle}</td>
                          <td className="p-4 font-semibold text-slate-900">
                            <div>📅 {inv.date}</div>
                            <div className="text-[10px] text-slate-400 font-bold mt-0.5">
                              ⏰ Jam {inv.time} WIB
                            </div>
                          </td>
                          <td className="p-4 text-slate-600">
                            {inv.interviewer}
                          </td>
                          <td className="p-4">
                            <span className="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold text-slate-600">
                              {inv.type}
                            </span>
                          </td>
                          <td className="p-4">
                            <span
                              className={`px-2 py-0.5 rounded text-[10px] font-bold ${inv.status === "Scheduled" ? "bg-amber-50 text-amber-700" : "bg-emerald-50 text-emerald-700"}`}
                            >
                              {inv.status === "Scheduled"
                                ? "Menunggu"
                                : "Selesai"}
                            </span>
                          </td>
                          {/* Tombol eksekusi hanya dirender untuk Admin */}
                          {role === "Admin" && (
                            <td className="p-4 pr-5 text-right">
                              {inv.status === "Scheduled" ? (
                                <div className="inline-flex gap-2">
                                  <button
                                    onClick={() => handleMarkCompleted(inv.id)}
                                    className="bg-emerald-600 text-white px-2 py-1 rounded text-[10px] font-bold hover:bg-emerald-700 transition-all"
                                  >
                                    Selesai
                                  </button>
                                  <button
                                    onClick={() =>
                                      handleCancelInterview(
                                        inv.id,
                                        inv.candidateName,
                                      )
                                    }
                                    className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] font-bold hover:bg-rose-50 hover:text-rose-600 transition-all"
                                  >
                                    Batal
                                  </button>
                                </div>
                              ) : (
                                <span className="text-[10px] text-slate-400 font-bold">
                                  ✓ Terarsip
                                </span>
                              )}
                            </td>
                          )}
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 6. PUBLIC JOB BOARD TAB (SIMULATION SUITE)
      // ==========================================
      function CareersBoardTab({
        jobs,
        candidates,
        setCandidates,
        triggerToast,
        addActivity,
      }) {
        const activeOpenJobs = useMemo(
          () => jobs.filter((j) => j.status === "Active"),
          [jobs],
        );
        const [applyJob, setApplyJob] = useState(null);

        const handleFormSubmitApplication = (e) => {
          e.preventDefault();
          const fData = new FormData(e.target);

          const newCandidate = {
            id: Date.now(),
            name: fData.get("cand_name"),
            email: fData.get("cand_email"),
            phone: fData.get("cand_phone"),
            role: applyJob.title,
            jobId: applyJob.id,
            stage: "Applied",
            avatar: fData.get("cand_name").substring(0, 2).toUpperCase(),
            notes: ["Pendaftaran mandiri melalui Halaman Karir Publik."],
            appliedDate: new Date().toISOString().split("T")[0],
          };

          setCandidates((prev) => [newCandidate, ...prev]);
          triggerToast(
            `Sukses! Lamaran Anda untuk ${applyJob.title} telah dikirim.`,
          );
          addActivity(
            `Pelamar baru "${newCandidate.name}" mendaftar mandiri via Portal Karir`,
            "candidate",
          );
          setApplyJob(null);
        };

        return (
          <div className="space-y-6 animate-fade-in">
            <div className="bg-indigo-900 text-white p-6 rounded-2xl shadow-md relative overflow-hidden">
              <div className="absolute top-0 right-0 opacity-10 text-9xl transform translate-x-10 translate-y-[-20%] font-extrabold">
                CAREERS
              </div>
              <h3 className="text-xl font-bold">
                Gabung Bersama Tim Hebat Kami
              </h3>
              <p className="text-xs text-indigo-200 mt-1 max-w-xl">
                Halaman simulasi ini mewakili tampilan papan karir eksternal
                perusahaan. Isilah berkas lamaran di bawah untuk menguji alur
                pipeline otomatis masuk ke sistem ATS.
              </p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {activeOpenJobs.length === 0 ? (
                <p className="text-xs text-slate-400 col-span-2 text-center py-6">
                  Saat ini tidak ada lowongan yang aktif dibuka publik.
                </p>
              ) : (
                activeOpenJobs.map((j) => (
                  <div
                    key={j.id}
                    className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between hover:shadow-md transition-shadow"
                  >
                    <div>
                      <div className="flex items-start justify-between">
                        <h4 className="font-bold text-slate-900 text-sm">
                          {j.title}
                        </h4>
                        <span className="bg-indigo-50 text-indigo-700 text-[9px] font-bold px-2 py-0.5 rounded-md uppercase">
                          {j.department}
                        </span>
                      </div>
                      <div className="flex gap-4 text-[10px] text-slate-400 font-bold mt-1.5">
                        <span>📍 {j.location}</span>
                        <span>💼 {j.type}</span>
                        <span>💰 {j.salary}</span>
                      </div>
                      <p className="text-xs text-slate-600 font-medium mt-3 leading-relaxed line-clamp-3">
                        {j.description}
                      </p>
                    </div>
                    <div className="mt-5 pt-3 border-t border-slate-100 flex justify-end">
                      <button
                        onClick={() => setApplyJob(j)}
                        className="bg-slate-900 hover:bg-slate-800 text-white font-bold text-[11px] px-3.5 py-2 rounded-xl transition-all"
                      >
                        Lamar Sekarang
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>

            {/* Form Modal Simulasi Apply */}
            {applyJob && (
              <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade-in">
                <div className="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden border">
                  <div className="p-5 border-b flex justify-between items-center bg-slate-50">
                    <div>
                      <h4 className="font-bold text-slate-900 text-sm">
                        Kirim Berkas Lamaran
                      </h4>
                      <p className="text-[11px] text-indigo-600 font-bold mt-0.5">
                        Posisi: {applyJob.title}
                      </p>
                    </div>
                    <button
                      onClick={() => setApplyJob(null)}
                      className="text-slate-400 hover:text-slate-700"
                    >
                      <Icons.Close />
                    </button>
                  </div>
                  <form
                    onSubmit={handleFormSubmitApplication}
                    className="p-5 space-y-4"
                  >
                    <div>
                      <label className="block text-[11px] font-bold text-slate-600 mb-1">
                        Nama Lengkap Pelamar
                      </label>
                      <input
                        name="cand_name"
                        required
                        placeholder="Contoh: Wildan Fahmi"
                        className="w-full border p-2 rounded-xl text-xs outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-600 mb-1">
                        Email Aktif
                      </label>
                      <input
                        type="email"
                        name="cand_email"
                        required
                        placeholder="wildan@example.com"
                        className="w-full border p-2 rounded-xl text-xs outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-600 mb-1">
                        Nomor Telepon/WhatsApp
                      </label>
                      <input
                        name="cand_phone"
                        required
                        placeholder="081234..."
                        className="w-full border p-2 rounded-xl text-xs outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div className="bg-slate-50 p-3 rounded-xl border border-dashed text-center text-[10px] text-slate-400 font-medium">
                      📎 Simulasi Resume / Dokumen CV Otomatis Terbuat oleh
                      Sistem
                    </div>
                    <div className="pt-2 flex justify-end gap-2">
                      <button
                        type="button"
                        onClick={() => setApplyJob(null)}
                        className="px-4 py-2 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-xl"
                      >
                        Batal
                      </button>
                      <button
                        type="submit"
                        className="px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md"
                      >
                        Kirim Lamaran
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ==========================================
      // 7. DIALOG COMPONENT: JOB ADD/EDIT FORM
      // ==========================================
      function JobFormModal({
        modal,
        setJobModal,
        jobs,
        setJobs,
        triggerToast,
        addActivity,
      }) {
        const isEdit = modal.mode === "edit";

        const [title, setTitle] = useState(isEdit ? modal.data.title : "");
        const [dept, setDept] = useState(
          isEdit ? modal.data.department : "Engineering",
        );
        const [type, setType] = useState(
          isEdit ? modal.data.type : "Full-time",
        );
        const [loc, setLoc] = useState(
          isEdit ? modal.data.location : "Jakarta (Hybrid)",
        );
        const [exp, setExp] = useState(
          isEdit ? modal.data.experience : "Mid-Level",
        );
        const [salary, setSalary] = useState(
          isEdit ? modal.data.salary : "Rp 10M - 15M",
        );
        const [status, setStatus] = useState(
          isEdit ? modal.data.status : "Active",
        );
        const [desc, setDesc] = useState(isEdit ? modal.data.description : "");

        // AI INTEGRATION SIMULATION GENERATOR BOX
        const triggerAIGenerator = () => {
          if (!title) {
            alert(
              "Tolong ketikkan Judul Pekerjaan terlebih dahulu agar AI mengenali konteks deskripsi!",
            );
            return;
          }
          // Simulated AI payload responses dictionary
          const aiRepo = {
            frontend:
              "Bertanggung jawab membangun UI interaktif berkinerja tinggi, berkolaborasi dengan tim backend API, mengoptimalkan rendering core web vitals, dan memastikan struktur penulisan kode komponen React/Vue bersih dan terdokumentasi.",
            backend:
              "Merancang arsitektur microservices kokoh, mengelola skalabilitas database PostgreSQL/MongoDB, mengoptimalkan query, membangun RESTful API/GraphQL aman, serta menjamin keandalan integrasi sistem cloud server.",
            product:
              "Menyusun roadmap taktis pengembangan produk, melakukan riset pasar dan kompetitor secara mendalam, menerjemahkan kebutuhan user menjadi PRD yang actionable, serta menyelaraskan visi bisnis antardepartemen.",
            ui: "Membuat desain wireframe, mockup visual high-fidelity, prototype interaktif untuk kebutuhan usability testing, serta membangun komprehensif design system yang reusable bagi seluruh tim engineering.",
          };

          const key = title.toLowerCase();
          let matchedText =
            "Tugas mencakup analisis kebutuhan teknis, implementasi best practice industri, menjaga kualitas performa produk, dan berkontribusi aktif dalam kultur inovasi berkelanjutan di dalam tim.";

          if (
            key.includes("frontend") ||
            key.includes("react") ||
            key.includes("developer")
          )
            matchedText = aiRepo.frontend;
          else if (
            key.includes("backend") ||
            key.includes("node") ||
            key.includes("engineer")
          )
            matchedText = aiRepo.backend;
          else if (key.includes("product") || key.includes("pm"))
            matchedText = aiRepo.product;
          else if (
            key.includes("design") ||
            key.includes("ux") ||
            key.includes("ui")
          )
            matchedText = aiRepo.ui;

          setDesc(`[AI Generated Description]:\n${matchedText}`);
          triggerToast(
            "AI berhasil mengenerate deskripsi pekerjaan yang cocok!",
          );
        };

        const handleSubmitForm = (e) => {
          e.preventDefault();
          if (isEdit) {
            const updatedJobs = jobs.map((j) =>
              j.id === modal.data.id
                ? {
                    ...j,
                    title,
                    department: dept,
                    type,
                    location: loc,
                    experience: exp,
                    salary,
                    status,
                    description: desc,
                  }
                : j,
            );
            setJobs(updatedJobs);
            triggerToast("Perubahan lowongan sukses disimpan.");
            addActivity(`Lowongan "${title}" diperbarui oleh Admin`, "job");
          } else {
            const newJ = {
              id: Date.now(),
              title,
              department: dept,
              type,
              location: loc,
              experience: exp,
              salary,
              status,
              description: desc,
              applicants: 0,
              date: new Date().toISOString().split("T")[0],
            };
            setJobs([newJ, ...jobs]);
            triggerToast("Lowongan baru berhasil dipublikasikan!");
            addActivity(`Membuka lowongan pekerjaan baru: "${title}"`, "job");
          }
          setJobModal({ open: false, mode: "add", data: null });
        };

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden border border-slate-100 flex flex-col max-h-[90vh]">
              <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider">
                  {isEdit
                    ? `Edit Lowongan JOB-${modal.data.id}`
                    : "Buka Lowongan Pekerjaan Baru"}
                </h3>
                <button
                  onClick={() =>
                    setJobModal({ open: false, mode: "add", data: null })
                  }
                  className="text-slate-400 hover:text-slate-700"
                >
                  <Icons.Close />
                </button>
              </div>

              <form
                onSubmit={handleSubmitForm}
                className="p-6 space-y-4 overflow-y-auto custom-scroll flex-1 bg-slate-50/50"
              >
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Judul Lowongan Kerja
                    </label>
                    <input
                      type="text"
                      required
                      value={title}
                      onChange={(e) => setTitle(e.target.value)}
                      placeholder="Contoh: Senior React Developer"
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 font-medium"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Departemen Divisi
                    </label>
                    <select
                      value={dept}
                      onChange={(e) => setDept(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs bg-white font-medium outline-none"
                    >
                      <option value="Engineering">Engineering</option>
                      <option value="Product">Product</option>
                      <option value="Design">Design</option>
                      <option value="Marketing">Marketing</option>
                      <option value="HR / Operations">HR / Operations</option>
                    </select>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Tipe Kontrak
                    </label>
                    <select
                      value={type}
                      onChange={(e) => setType(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs bg-white font-medium outline-none"
                    >
                      <option value="Full-time">Full-time</option>
                      <option value="Part-time">Part-time</option>
                      <option value="Contract">Contract / Freelance</option>
                      <option value="Internship">Internship</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Lokasi Kerja
                    </label>
                    <input
                      type="text"
                      required
                      value={loc}
                      onChange={(e) => setLoc(e.target.value)}
                      placeholder="Contoh: Jakarta (Hybrid)"
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs outline-none focus:bg-white font-medium"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Ekspektasi Gaji Bulanan
                    </label>
                    <input
                      type="text"
                      required
                      value={salary}
                      onChange={(e) => setSalary(e.target.value)}
                      placeholder="Contoh: Rp 15M - 20M"
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs outline-none focus:bg-white font-medium"
                    />
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Pengalaman Dibutuhkan
                    </label>
                    <input
                      type="text"
                      required
                      value={exp}
                      onChange={(e) => setExp(e.target.value)}
                      placeholder="Contoh: Senior (3+ Tahun)"
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs outline-none focus:bg-white font-medium"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Status Publikasi
                    </label>
                    <select
                      value={status}
                      onChange={(e) => setStatus(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs bg-white font-medium outline-none"
                    >
                      <option value="Active">Aktif (Ditampilkan Publik)</option>
                      <option value="Closed">Tutup (Arsip Internal)</option>
                    </select>
                  </div>
                </div>

                <div>
                  <div className="flex justify-between items-center mb-1">
                    <label className="text-[11px] font-bold text-slate-600">
                      Deskripsi & Kualifikasi Kerja
                    </label>
                    <button
                      type="button"
                      onClick={triggerAIGenerator}
                      className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-[10px] font-bold px-2.5 py-1 rounded-lg border border-indigo-200 flex items-center gap-1 transition-all"
                    >
                      <Icons.Sparkles /> Generate Otomatis dengan AI
                    </button>
                  </div>
                  <textarea
                    rows="4"
                    required
                    value={desc}
                    onChange={(e) => setDesc(e.target.value)}
                    placeholder="Tuliskan cakupan tugas pekerjaan di sini..."
                    className="w-full border border-slate-200 p-3 rounded-xl text-xs outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 font-medium font-mono"
                  />
                </div>

                <div className="pt-4 border-t border-slate-100 flex justify-end gap-2.5 bg-white -mx-6 -mb-6 p-4">
                  <button
                    type="button"
                    onClick={() =>
                      setJobModal({ open: false, mode: "add", data: null })
                    }
                    className="px-5 py-2 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-all"
                  >
                    Batal
                  </button>
                  <button
                    type="submit"
                    className="px-5 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md transition-all"
                  >
                    {isEdit ? "Simpan Perubahan" : "Publikasikan Lowongan"}
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      // ==========================================
      // 8. DIALOG COMPONENT: CANDIDATE PRO COMPREHENSIVE DETAIL
      // ==========================================
      function CandidateDetailModal({
        modal,
        setCandModal,
        candidates,
        setCandidates,
        setSchedModal,
        triggerToast,
      }) {
        const cand = modal.data;
        const [newNote, setNewNote] = useState("");
        const [emailTemplateOpen, setEmailTemplateOpen] = useState(false);
        const [emailType, setEmailType] = useState("interview");

        const handleAddCommentNote = (e) => {
          e.preventDefault();
          if (!newNote.trim()) return;

          const updated = candidates.map((c) => {
            if (c.id === cand.id) {
              return { ...c, notes: [...c.notes, `[Wildan F.]: ${newNote}`] };
            }
            return c;
          });
          setCandidates(updated);
          // Sync preview live item injection update
          cand.notes.push(`[Wildan F.]: ${newNote}`);
          setNewNote("");
          triggerToast("Catatan evaluasi berhasil ditambahkan.");
        };

        // Automated Email Automation Templates Simulation
        const simulatedEmailText = useMemo(() => {
          if (emailType === "interview") {
