    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
      }
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 10px;
      }
      .drag-over {
        background-color: #f0fdf4 !important;
        border: 2px dashed #22c55e !important;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.25s ease-out forwards;
      }
    </style>
  </head>

      // --- MAIN EXECUTABLE APP ---
      function App() {
        // Core States
        const [auth, setAuth] = useState(
          () =>
            JSON.parse(localStorage.getItem("rs_auth")) || {
              loggedIn: false,
              role: "Admin",
            },
        );
        const [activeTab, setActiveTab] = useState("dashboard");
        const [isSidebarOpen, setIsSidebarOpen] = useState(false); // Mobile Menu State
        const [jobs, setJobs] = useState(
          () => JSON.parse(localStorage.getItem("rs_jobs")) || initialJobs,
        );
        const [candidates, setCandidates] = useState(
          () =>
            JSON.parse(localStorage.getItem("rs_candidates")) ||
            initialCandidates,
        );
        const [interviews, setInterviews] = useState(
          () =>
            JSON.parse(localStorage.getItem("rs_interviews")) ||
            initialInterviews,
        );
        const [activities, setActivities] = useState(
          () =>
            JSON.parse(localStorage.getItem("rs_activities")) ||
            initialActivities,
        );
        const [toasts, setToasts] = useState([]);

        // Modal Controls
        const [jobModal, setJobModal] = useState({
          open: false,
          mode: "add",
          data: null,
        });
        const [candModal, setCandModal] = useState({ open: false, data: null });
        const [schedModal, setSchedModal] = useState({
          open: false,
          candidate: null,
        });

        // Synchronize with LocalStorage
        useEffect(
          () => localStorage.setItem("rs_auth", JSON.stringify(auth)),
          [auth],
        );
        useEffect(
          () => localStorage.setItem("rs_jobs", JSON.stringify(jobs)),
          [jobs],
        );
        useEffect(
          () =>
            localStorage.setItem("rs_candidates", JSON.stringify(candidates)),
          [candidates],
        );
        useEffect(
          () =>
            localStorage.setItem("rs_interviews", JSON.stringify(interviews)),
          [interviews],
        );
        useEffect(
          () =>
            localStorage.setItem("rs_activities", JSON.stringify(activities)),
          [activities],
        );

        // Toast System Trigger
        const triggerToast = (message) => {
          const id = Date.now();
          setToasts((prev) => [...prev, { id, message }]);
          setTimeout(
            () => setToasts((prev) => prev.filter((t) => t.id !== id)),
            3000,
          );
        };

        const addActivity = (text, type = "candidate") => {
          const newAct = { id: Date.now(), text, timestamp: "Baru saja", type };
          setActivities((prev) => [newAct, ...prev.slice(0, 15)]);
        };

        const handleNavClick = (tab) => {
          setActiveTab(tab);
          setIsSidebarOpen(false); // Auto close sidebar on mobile after clicking
        };

        if (!auth.loggedIn) {
          return (
            <LoginPage
              onLogin={(role) => {
                setAuth({ loggedIn: true, role });
                triggerToast(`Selamat datang! Anda masuk sebagai ${role}`);
              }}
            />
          );
        }

        return (
          <div className="flex h-screen overflow-hidden bg-slate-50 text-slate-900 relative">
            {/* OVERLAY FOR MOBILE SIDEBAR */}
            {isSidebarOpen && (
              <div
                className="fixed inset-0 bg-slate-900/50 z-20 md:hidden backdrop-blur-sm"
                onClick={() => setIsSidebarOpen(false)}
              ></div>
            )}

            {/* SIDEBAR COMPONENT */}
            <aside
              className={`fixed md:static inset-y-0 left-0 transform ${isSidebarOpen ? "translate-x-0" : "-translate-x-full"} md:translate-x-0 transition-transform duration-300 ease-in-out w-64 bg-slate-900 text-white flex flex-col shadow-2xl z-30 shrink-0`}
            >
              <div className="p-6 border-b border-slate-800 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-600/30">
                    R
                  </div>
                  <h1 className="text-xl font-bold tracking-tight">
                    RecruitSync<span className="text-indigo-400">.</span>
                  </h1>
                </div>
              </div>

              {/* Navigation Tabs */}
              <nav className="flex-1 px-4 space-y-1.5 mt-6 overflow-y-auto">
                <SidebarItem
                  active={activeTab === "dashboard"}
                  onClick={() => handleNavClick("dashboard")}
                  icon={<Icons.Layout />}
                  label="Dashboard"
                />
                {auth.role === "Admin" && (
                  <>
                    <SidebarItem
                      active={activeTab === "jobs"}
                      onClick={() => handleNavClick("jobs")}
                      icon={<Icons.Briefcase />}
                      label="Job Management"
                    />
                    <SidebarItem
                      active={activeTab === "pipeline"}
                      onClick={() => handleNavClick("pipeline")}
                      icon={<Icons.Users />}
                      label="Candidate Pipeline"
                    />
                  </>
                )}
                <SidebarItem
                  active={activeTab === "scheduler"}
                  onClick={() => handleNavClick("scheduler")}
                  icon={<Icons.Calendar />}
                  label="Interview Scheduler"
                />
                {auth.role === "Interviewer" && (
                  <SidebarItem
                    active={activeTab === "careers"}
                    onClick={() => handleNavClick("careers")}
                    icon={<Icons.Globe />}
                    label="Public Job Board"
                  />
                )}
              </nav>

              {/* User Profile & Role Switcher */}
              <div className="p-4 border-t border-slate-800 bg-slate-950/40">
                <div className="flex items-center justify-between mb-3 text-xs text-slate-400">
                  <span className="flex items-center gap-1">
                    <Icons.Shield /> Role: <strong>{auth.role}</strong>
                  </span>
                  <button
                    onClick={() => {
                      const nextRole =
                        auth.role === "Admin" ? "Interviewer" : "Admin";
                      setAuth((p) => ({ ...p, role: nextRole }));
                      if (
                        nextRole === "Interviewer" &&
                        ["jobs", "pipeline"].includes(activeTab)
                      )
                        setActiveTab("dashboard");
                      if (nextRole === "Admin" && activeTab === "careers")
                        setActiveTab("dashboard");
                      triggerToast(`Role dialihkan ke ${nextRole}`);
                    }}
                    className="text-indigo-400 hover:underline hover:text-indigo-300 font-medium"
                  >
                    Ubah
                  </button>
                </div>
                <div className="bg-slate-800/80 rounded-xl p-3 flex items-center gap-3 mb-3">
                  <div className="w-9 h-9 rounded-full bg-indigo-500 flex items-center justify-center font-bold text-sm text-white shrink-0">
                    WF
                  </div>
                  <div className="overflow-hidden">
                    <p className="text-xs font-semibold truncate text-slate-200">
                      Mochamad Rifki Ramadhan
                    </p>
                    <p className="text-[10px] text-slate-400 truncate">
                      mrifkiri@gmail.com
                    </p>
                  </div>
                </div>
                <button
                  onClick={() => setAuth({ loggedIn: false, role: "Admin" })}
                  className="w-full flex items-center justify-center gap-2 px-4 py-2 text-xs text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all"
                >
                  <Icons.LogOut /> Logout
                </button>
              </div>
            </aside>

            {/* MAIN PAGE PLATFORM CONTAINER */}
            <main className="flex-1 flex flex-col h-screen overflow-hidden w-full">
              {/* Main Header bar */}
              <header className="h-16 glass-effect border-b border-slate-200/80 flex items-center justify-between px-4 md:px-8 z-10 sticky top-0">
                <div className="flex items-center gap-3">
                  <button
                    className="md:hidden text-slate-600 hover:text-slate-900 transition-colors"
                    onClick={() => setIsSidebarOpen(true)}
                  >
                    <Icons.Menu />
                  </button>
                  <h2 className="text-lg font-bold text-slate-800 capitalize tracking-tight truncate">
                    {activeTab === "careers" ? "Public Job Board" : activeTab}
                  </h2>
                </div>
                <div className="text-xs md:text-sm text-slate-500 font-medium bg-slate-100 px-3.5 py-1.5 rounded-full shadow-inner shrink-0">
                  May 30, 2026
                </div>
              </header>

              {/* Component Tab View Router */}
              <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scroll">
                {activeTab === "dashboard" && (
                  <DashboardTab
                    jobs={jobs}
                    candidates={candidates}
                    interviews={interviews}
                    activities={activities}
                    role={auth.role}
                  />
                )}
                {activeTab === "jobs" && auth.role === "Admin" && (
                  <JobManagementTab
                    jobs={jobs}
                    setJobs={setJobs}
                    role={auth.role}
                    setJobModal={setJobModal}
                    triggerToast={triggerToast}
                    addActivity={addActivity}
                  />
                )}
                {activeTab === "pipeline" && auth.role === "Admin" && (
                  <PipelineTab
                    candidates={candidates}
                    setCandidates={setCandidates}
                    jobs={jobs}
                    setCandModal={setCandModal}
                    setSchedModal={setSchedModal}
                    triggerToast={triggerToast}
                    addActivity={addActivity}
                  />
                )}
                {activeTab === "scheduler" && (
                  <SchedulerTab
                    interviews={interviews}
                    setInterviews={setInterviews}
                    candidates={candidates}
                    triggerToast={triggerToast}
                    role={auth.role}
                  />
                )}
                {activeTab === "careers" && auth.role === "Interviewer" && (
                  <CareersBoardTab
                    jobs={jobs}
                    candidates={candidates}
                    setCandidates={setCandidates}
                    triggerToast={triggerToast}
                    addActivity={addActivity}
                  />
                )}
              </div>
            </main>

            {/* --- MODAL RENDERS HUB --- */}
            {jobModal.open && (
              <JobFormModal
                modal={jobModal}
                setJobModal={setJobModal}
                jobs={jobs}
                setJobs={setJobs}
                triggerToast={triggerToast}
                addActivity={addActivity}
              />
            )}
            {candModal.open && (
              <CandidateDetailModal
                modal={candModal}
                setCandModal={setCandModal}
                candidates={candidates}
                setCandidates={setCandidates}
                setSchedModal={setSchedModal}
                triggerToast={triggerToast}
              />
            )}
            {schedModal.open && (
              <ScheduleInterviewModal
                modal={schedModal}
                setSchedModal={setSchedModal}
                interviews={interviews}
                setInterviews={setInterviews}
                triggerToast={triggerToast}
              />
            )}

            {/* Toast Notification Container */}
            <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 max-w-[90%] md:max-w-none">
              {toasts.map((t) => (
                <div
                  key={t.id}
                  className="animate-fade-in flex items-center gap-3 bg-slate-900 text-white px-5 py-3.5 rounded-xl shadow-2xl border border-slate-700/50"
                >
                  <div className="w-5 h-5 rounded-full bg-emerald-500 flex items-center justify-center text-white font-bold text-xs shrink-0">
                    ✓
                  </div>
                  <p className="text-xs font-semibold tracking-wide">
                    {t.message}
                  </p>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // ==========================================

      // ==========================================

                  <input

                <div>

      // ==========================================
      // 2. DASHBOARD TAB OVERVIEW
      // ==========================================
      function DashboardTab({
        jobs,
        candidates,
        interviews,
        activities,
        role,
      }) {
        const metrics = useMemo(() => {
          const activeJ = jobs.filter((j) => j.status === "Active").length;
          const totalC = candidates.length;
          const hiredC = candidates.filter((c) => c.stage === "Hired").length;
          const interviewC = candidates.filter(
            (c) => c.stage === "Interview",
          ).length;
          const conversion = totalC ? Math.round((hiredC / totalC) * 100) : 0;
          return { activeJ, totalC, hiredC, interviewC, conversion };
        }, [jobs, candidates]);

        const interviewerSchedule = useMemo(
          () => interviews.filter((i) => i.status === "Scheduled"),
          [interviews],
        );

        return (
          <div className="space-y-8 animate-fade-in">
            {role === "Admin" ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <StatCard
                  title="Pekerjaan Aktif"
                  value={metrics.activeJ}
                  desc="Lowongan dibuka publik"
                  color="border-l-4 border-blue-500"

                <StatCard
                  title="Total Kandidat"
                  value={metrics.totalC}
                  desc="Pelamar terdaftar di sistem"
                  color="border-l-4 border-indigo-500"

                <StatCard
                  title="Proses Interview"
                  value={metrics.interviewC}
                  desc="Tahap evaluasi aktif"
                  color="border-l-4 border-amber-500"
                />
                <StatCard
                  title="Rasio Kelulusan"
                  value={`${metrics.conversion}%`}
                  desc="Dari total pendaftaran masuk"
                  color="border-l-4 border-emerald-500"

                  Halo, Interviewer! 👋
                </h2>
                <p className="text-indigo-200 text-sm">
                  Selamat datang di portal RecruitSync. Silakan periksa jadwal

                </p>

            <div
              className={`grid grid-cols-1 ${role === "Admin" ? "lg:grid-cols-3" : "lg:grid-cols-1"} gap-4 md:gap-6`}

                <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">

                      <div className="flex justify-between text-xs font-semibold mb-1.5">

                        <span className="text-slate-900">

                            candidates.filter((c) => c.stage === "Applied")

                          }{" "}
                          Pelamar
                        </span>
                      </div>
                      <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div
                          className="bg-blue-500 h-full rounded-full"
                          style={{ width: "100%" }}
                        ></div>
                      </div>
                    </div>
                    <div>
                      <div className="flex justify-between text-xs font-semibold mb-1.5">
                        <span className="text-slate-600">Interview</span>
                        <span className="text-slate-900">
                          {metrics.interviewC} Pelamar
                        </span>
                      </div>
                      <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">

                          className="bg-amber-500 h-full rounded-full"

                <h3 className="text-sm font-bold text-slate-900 tracking-tight mb-1">
                  {role === "Admin"
                    ? "Interview Mendatang"

              </div>

              {role === "Admin" && (
                <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h3 className="text-sm font-bold text-slate-900 tracking-tight mb-1">
                    Aktivitas Terbaru
                  </h3>
                  <p className="text-xs text-slate-400 font-medium mb-4">
                    Log jejak operasional rekrutmen
                  </p>
                  <div className="space-y-3.5 max-h-[220px] overflow-y-auto custom-scroll pr-1">
                    {activities.map((act) => (
                      <div
                        key={act.id}
                        className="flex gap-3 text-xs items-start"
                      >
                        <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full mt-1.5 shrink-0"></div>
                        <div className="flex-1">
                          <p className="text-slate-700 font-medium leading-relaxed">
                            {act.text}
                          </p>
                          <span className="text-[10px] text-slate-400 font-semibold">

                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      function StatCard({ title, value, desc, color }) {
        return (
          <div

          >
            <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">

            </p>
            <p className="text-3xl font-extrabold text-slate-900 mt-2 tracking-tight">
              {value}

            <p className="text-xs text-slate-500 font-medium mt-1.5">{desc}</p>
          </div>
        );
      }

      // ==========================================
      // 3. JOB MANAGEMENT TAB
      // ==========================================
      function JobManagementTab({
        jobs,
        setJobs,
        role,
        setJobModal,
        triggerToast,
        addActivity,
      }) {
        const [searchQuery, setSearchQuery] = useState("");
        const [statusFilter, setStatusFilter] = useState("All");
        const [deptFilter, setDeptFilter] = useState("All");
        const [sortBy, setSortBy] = useState("newest");

        const departments = useMemo(
          () => ["All", ...new Set(jobs.map((j) => j.department))],
          [jobs],
        );

        const processJobs = useMemo(() => {
          let result = jobs.filter((j) => {
            const matchesSearch = j.title
              .toLowerCase()
              .includes(searchQuery.toLowerCase());
            const matchesStatus =
              statusFilter === "All" || j.status === statusFilter;
            const matchesDept =
              deptFilter === "All" || j.department === deptFilter;
            return matchesSearch && matchesStatus && matchesDept;
          });
          if (sortBy === "newest") result.sort((a, b) => b.id - a.id);
          if (sortBy === "oldest") result.sort((a, b) => a.id - b.id);
          if (sortBy === "applicants")
            result.sort((a, b) => b.applicants - a.applicants);
          return result;
        }, [jobs, searchQuery, statusFilter, deptFilter, sortBy]);

        const handleDeleteJob = (id, title) => {
          if (role !== "Admin") {
            alert("Aksi Ditolak: Hanya Admin!");
            return;
          }
          if (
            confirm(`Apakah Anda yakin ingin menghapus lowongan "${title}"?`)
          ) {
            setJobs((prev) => prev.filter((j) => j.id !== id));
            triggerToast(`Lowongan ${title} berhasil dihapus.`);
            addActivity(`Lowongan "${title}" dihapus permanen`, "job");
          }
        };

        return (
          <div className="space-y-6 animate-fade-in">
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
              <div className="flex flex-col sm:flex-row flex-wrap gap-3 items-center w-full md:w-auto">
                <div className="relative w-full sm:w-64">
                  <span className="absolute inset-y-0 left-3 flex items-center text-slate-400">
                    <Icons.Search />
                  </span>
                  <input
                    type="text"
                    placeholder="Cari judul pekerjaan..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="pl-9 pr-4 py-2 w-full bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all font-medium"
                  />
                </div>
                <div className="flex gap-2 w-full sm:w-auto">
                  <select
                    value={statusFilter}
                    onChange={(e) => setStatusFilter(e.target.value)}
                    className="w-full sm:w-auto bg-slate-50 border border-slate-200 text-xs font-bold p-2 rounded-xl outline-none focus:bg-white"
                  >
                    <option value="All">Semua Status</option>
                    <option value="Active">Aktif</option>
                    <option value="Closed">Tutup</option>
                  </select>
                  <select
                    value={deptFilter}
                    onChange={(e) => setDeptFilter(e.target.value)}
                    className="w-full sm:w-auto bg-slate-50 border border-slate-200 text-xs font-bold p-2 rounded-xl outline-none focus:bg-white"
                  >
                    {departments.map((d) => (
                      <option key={d} value={d}>
                        {d === "All" ? "Semua Divisi" : d}
                      </option>
                    ))}
                  </select>
                </div>
              </div>
              <button
                onClick={() =>
                  setJobModal({ open: true, mode: "add", data: null })
                }
                className={`w-full md:w-auto justify-center text-xs font-bold text-white px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-md transition-all ${role === "Admin" ? "bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/10" : "bg-slate-400 cursor-not-allowed"}`}
              >
                <Icons.Plus /> Buka Lowongan
              </button>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-[700px]">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-200 text-[10px] uppercase text-slate-400 font-bold tracking-wider">
                      <th className="p-4 pl-6">Detail Pekerjaan</th>
                      <th className="p-4">Departemen</th>
                      <th className="p-4">Tipe & Lokasi</th>
                      <th className="p-4">Ekspektasi Gaji</th>
                      <th className="p-4">Status</th>
                      <th className="p-4 text-center">Pelamar</th>
                      <th className="p-4 pr-6 text-right">Aksi</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-xs font-medium text-slate-700">
                    {processJobs.length === 0 ? (
                      <tr>
                        <td
                          colSpan="7"
                          className="p-10 text-center text-slate-400"
                        >
                          Tidak ada lowongan.
                        </td>
                      </tr>
                    ) : (
                      processJobs.map((job) => (
                        <tr
                          key={job.id}
                          className="hover:bg-slate-50/60 transition-colors"
                        >
                          <td className="p-4 pl-6">
                            <p className="font-bold text-slate-900 text-sm">
                              {job.title}
                            </p>
                            <p className="text-[10px] text-slate-400 font-semibold mt-0.5">
                              ID: JOB-{job.id} • {job.date}
                            </p>
                          </td>
                          <td className="p-4 text-slate-600">
                            {job.department}
                          </td>
                          <td className="p-4">
                            <p className="text-slate-800 font-semibold">
                              {job.type}
                            </p>
                            <p className="text-[10px] text-slate-400 font-semibold mt-0.5">
                              {job.location}
                            </p>
                          </td>
                          <td className="p-4 text-slate-600">{job.salary}</td>
                          <td className="p-4">
                            <span
                              className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold border ${job.status === "Active" ? "bg-emerald-50 text-emerald-700 border-emerald-200" : "bg-slate-100 text-slate-600 border-slate-200"}`}
                            >
                              {job.status === "Active" ? "Aktif" : "Tutup"}
                            </span>
                          </td>
                          <td className="p-4 text-center font-bold text-slate-900 text-sm bg-slate-50/40">
                            {job.applicants}
                          </td>
                          <td className="p-4 pr-6 text-right">
                            <div className="inline-flex gap-1.5">
                              <button
                                onClick={() =>
                                  setJobModal({
                                    open: true,
                                    mode: "edit",
                                    data: job,
                                  })
                                }
                                className="p-1.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg"
                              >
                                <Icons.Pencil />
                              </button>
                              <button
                                onClick={() =>
                                  handleDeleteJob(job.id, job.title)
                                }
                                className="p-1.5 text-slate-500 hover:text-rose-600 hover:bg-rose-50 rounded-lg"
                              >
                                <Icons.Trash />
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 4. CANDIDATE PIPELINE KANBAN
      // ==========================================
      function PipelineTab({
        candidates,
        setCandidates,
        jobs,
        setCandModal,
        setSchedModal,
        triggerToast,
        addActivity,
      }) {
        const stages = ["Applied", "Interview", "Hired"];
        const [selectedJobId, setSelectedJobId] = useState("All");
        const [draggedCandId, setDraggedCandId] = useState(null);

        const filteredCandidates = useMemo(() => {
          if (selectedJobId === "All") return candidates;
          return candidates.filter((c) => c.jobId === Number(selectedJobId));
        }, [candidates, selectedJobId]);

        const onDragStart = (e, id) => {
          setDraggedCandId(id);
          e.dataTransfer.effectAllowed = "move";
          e.target.style.opacity = "0.4";
        };
        const onDragEnd = (e) => {
          e.target.style.opacity = "1";
          setDraggedCandId(null);
          document
            .querySelectorAll(".kanban-column-zone")
            .forEach((el) => el.classList.remove("drag-over"));
        };
        const onDragOver = (e) => {
          e.preventDefault();
          e.currentTarget.classList.add("drag-over");
        };
        const onDragLeave = (e) => {
          e.currentTarget.classList.remove("drag-over");
        };
        const onDrop = (e, targetStage) => {
          e.preventDefault();
          e.currentTarget.classList.remove("drag-over");
          if (!draggedCandId) return;
          const candidate = candidates.find((c) => c.id === draggedCandId);
          if (candidate && candidate.stage !== targetStage) {
            setCandidates(
              candidates.map((c) =>
                c.id === draggedCandId ? { ...c, stage: targetStage } : c,
              ),
            );
            triggerToast(`Status ${candidate.name} menjadi ${targetStage}`);
            addActivity(
              `Kandidat ${candidate.name} dipindah ke "${targetStage}"`,
              "candidate",
            );
          }
        };

        return (
          <div className="space-y-6 h-full flex flex-col animate-fade-in">
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
              <div className="w-full sm:w-auto">
                <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">
                  Saring Pipeline Lowongan
                </p>
                <select
                  value={selectedJobId}
                  onChange={(e) => setSelectedJobId(e.target.value)}
                  className="bg-slate-50 border border-slate-200 text-xs font-bold p-2 rounded-xl mt-1.5 outline-none focus:bg-white w-full sm:w-64"
                >
                  <option value="All">Semua Pekerjaan Terbuka</option>
                  {jobs.map((j) => (
                    <option key={j.id} value={j.id}>
                      {j.title}
                    </option>
                  ))}
                </select>
              </div>
              <div className="text-left sm:text-right text-xs font-medium text-slate-400">
                💡{" "}
                <em>
                  Tips: Tahan dan seret kartu kandidat untuk pindah tahap.
                </em>
              </div>
            </div>

            <div className="flex gap-4 md:gap-6 flex-1 overflow-x-auto pb-4 custom-scroll items-start snap-x snap-mandatory">
              {stages.map((stage) => {
                const list = filteredCandidates.filter(
                  (c) => c.stage === stage,
                );
                return (
                  <div
                    key={stage}
                    onDragOver={onDragOver}
                    onDragLeave={onDragLeave}
                    onDrop={(e) => onDrop(e, stage)}
                    className="kanban-column-zone snap-center shrink-0 w-[85vw] sm:w-[320px] max-w-[400px] bg-slate-100/70 border border-slate-200 rounded-2xl flex flex-col transition-all duration-200"
                  >
                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-white/50 rounded-t-2xl">
                      <h4 className="font-bold text-xs tracking-wide text-slate-700 uppercase flex items-center gap-2">
                        {stage === "Applied" && (
                          <div className="w-2 h-2 rounded-full bg-blue-500 shadow-sm"></div>
                        )}
                        {stage === "Interview" && (
                          <div className="w-2 h-2 rounded-full bg-amber-500 shadow-sm"></div>
                        )}
                        {stage === "Hired" && (
                          <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-sm"></div>
                        )}
                        {stage}
                      </h4>
                      <span className="bg-white border text-slate-800 font-extrabold text-xs px-2.5 py-0.5 rounded-full shadow-sm">
                        {list.length}
                      </span>
                    </div>
                    <div className="p-3 md:p-4 flex-1 overflow-y-auto custom-scroll space-y-3 min-h-[400px]">
                      {list.map((cand) => (
                        <div
                          key={cand.id}
                          draggable
                          onDragStart={(e) => onDragStart(e, cand.id)}
                          onDragEnd={onDragEnd}
                          onClick={() =>
                            setCandModal({ open: true, data: cand })
                          }
                          className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-400 transition-all cursor-grab active:cursor-grabbing group animate-fade-in"
                        >
                          <div className="flex items-center gap-3 mb-3">
                            <div className="w-9 h-9 rounded-full bg-indigo-50 text-indigo-700 font-bold text-xs flex items-center justify-center shrink-0">
                              {cand.avatar}
                            </div>
                            <div className="overflow-hidden">
                              <h5 className="font-bold text-slate-900 text-xs truncate group-hover:text-indigo-600 transition-colors">
                                {cand.name}
                              </h5>
                              <p className="text-[10px] text-slate-400 font-semibold truncate mt-0.5">
                                {cand.role}
                              </p>
                            </div>
                          </div>
                          <div className="space-y-1.5 text-[10px] text-slate-500 font-medium pt-2 border-t border-slate-100">
                            <p className="truncate flex items-center gap-1.5">
                              ✉️ {cand.email}
                            </p>
                            <p className="flex items-center gap-1.5">
                              📅 Masuk: {cand.appliedDate}
                            </p>
                          </div>
                          <div className="mt-3 pt-2.5 border-t border-slate-100 flex gap-2 justify-end">
                            {stage === "Interview" && (
                              <button
                                onClick={(e) => {
                                  e.stopPropagation();
                                  setSchedModal({
                                    open: true,
                                    candidate: cand,
                                  });
                                }}
                                className="bg-amber-50 hover:bg-amber-100 text-amber-800 text-[9px] font-bold px-2 py-1 rounded-md border border-amber-200"
                              >
                                🗓 Atur Jadwal
                              </button>
                            )}
                            <span className="text-[9px] text-slate-400 font-bold ml-auto md:opacity-0 group-hover:opacity-100 transition-opacity">
                              Detail →
                            </span>
                          </div>
                        </div>
                      ))}
                      {list.length === 0 && (
                        <div className="text-center p-8 text-xs font-semibold text-slate-400 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/40">
                          Kosong
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // ==========================================
      // 5. INTERVIEW SCHEDULER TAB
      // ==========================================
      function SchedulerTab({
        interviews,
        setInterviews,
        candidates,
        triggerToast,
        role,
      }) {
        const handleCancelInterview = (id, candName) => {
          if (role !== "Admin") return;
          if (confirm(`Batalkan jadwal interview ${candName}?`)) {
            setInterviews((prev) => prev.filter((i) => i.id !== id));
            triggerToast(`Jadwal ${candName} dibatalkan.`);
          }
        };

        const handleMarkCompleted = (id) => {
          if (role !== "Admin") return;
          setInterviews((prev) =>
            prev.map((i) => (i.id === id ? { ...i, status: "Completed" } : i)),
          );
          triggerToast("Status diperbarui ke Selesai.");
        };

        const displayInterviews = useMemo(
          () =>
            role === "Admin"
              ? interviews
              : interviews.filter((i) => i.status === "Scheduled"),
          [interviews, role],
        );

        return (
          <div className="space-y-6 animate-fade-in">
            <div className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wider mb-4">
                {role === "Admin"
                  ? "Agenda Wawancara Aktif"
                  : "Daftar Wawancara Anda"}
              </h3>
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse text-xs min-w-[700px]">
                  <thead>
                    <tr className="bg-slate-50 text-slate-400 font-bold border-b border-slate-200 uppercase text-[10px]">
                      <th className="p-4 pl-5">Nama Kandidat</th>
                      <th className="p-4">Lowongan Kerja</th>
                      <th className="p-4">Tanggal & Waktu</th>
                      <th className="p-4">Pewawancara</th>
                      <th className="p-4">Format</th>
                      <th className="p-4">Status</th>
                      {role === "Admin" && (
                        <th className="p-4 pr-5 text-right">Tindakan</th>
                      )}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                    {displayInterviews.length === 0 ? (
                      <tr>
                        <td
                          colSpan={role === "Admin" ? "7" : "6"}
                          className="p-8 text-center text-slate-400"
                        >
                          Belum ada agenda wawancara.
                        </td>
                      </tr>
                    ) : (
                      displayInterviews.map((inv) => (
                        <tr
                          key={inv.id}
                          className="hover:bg-slate-50/50 transition-colors"
                        >
                          <td className="p-4 pl-5 font-bold text-slate-900">
                            {inv.candidateName}
                          </td>
                          <td className="p-4 text-slate-600">{inv.jobTitle}</td>
                          <td className="p-4 font-semibold text-slate-900">
                            <div>📅 {inv.date}</div>
                            <div className="text-[10px] text-slate-400 font-bold mt-0.5">
                              ⏰ Jam {inv.time}
                            </div>
                          </td>
                          <td className="p-4 text-slate-600">
                            {inv.interviewer}
                          </td>
                          <td className="p-4">
                            <span className="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold text-slate-600">
                              {inv.type}
                            </span>
                          </td>
                          <td className="p-4">
                            <span
                              className={`px-2 py-0.5 rounded text-[10px] font-bold ${inv.status === "Scheduled" ? "bg-amber-50 text-amber-700" : "bg-emerald-50 text-emerald-700"}`}
                            >
                              {inv.status === "Scheduled"
                                ? "Menunggu"
                                : "Selesai"}
                            </span>
                          </td>
                          {role === "Admin" && (
                            <td className="p-4 pr-5 text-right">
                              {inv.status === "Scheduled" ? (
                                <div className="inline-flex gap-2">
                                  <button
                                    onClick={() => handleMarkCompleted(inv.id)}
                                    className="bg-emerald-600 text-white px-2 py-1 rounded text-[10px] font-bold hover:bg-emerald-700"
                                  >
                                    Selesai
                                  </button>
                                  <button
                                    onClick={() =>
                                      handleCancelInterview(
                                        inv.id,
                                        inv.candidateName,
                                      )
                                    }
                                    className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] font-bold hover:bg-rose-50 hover:text-rose-600"
                                  >
                                    Batal
                                  </button>
                                </div>
                              ) : (
                                <span className="text-[10px] text-slate-400 font-bold">
                                  ✓ Terarsip
                                </span>
                              )}
                            </td>
                          )}
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 6. PUBLIC JOB BOARD TAB
      // ==========================================
      function CareersBoardTab({
        jobs,
        candidates,
        setCandidates,
        triggerToast,
        addActivity,
      }) {
        const activeOpenJobs = useMemo(
          () => jobs.filter((j) => j.status === "Active"),
          [jobs],
        );
        const [applyJob, setApplyJob] = useState(null);

        const handleFormSubmitApplication = (e) => {
          e.preventDefault();
          const fData = new FormData(e.target);
          const newCandidate = {
            id: Date.now(),
            name: fData.get("cand_name"),
            email: fData.get("cand_email"),
            phone: fData.get("cand_phone"),
            role: applyJob.title,
            jobId: applyJob.id,
            stage: "Applied",
            avatar: fData.get("cand_name").substring(0, 2).toUpperCase(),
            notes: ["Pendaftaran mandiri melalui Halaman Karir."],
            appliedDate: new Date().toISOString().split("T")[0],
          };
          setCandidates((prev) => [newCandidate, ...prev]);
          triggerToast(`Sukses! Lamaran ${applyJob.title} terkirim.`);
          addActivity(
            `Pelamar baru "${newCandidate.name}" mendaftar`,
            "candidate",
          );
          setApplyJob(null);
        };

        return (
          <div className="space-y-6 animate-fade-in">
            <div className="bg-indigo-900 text-white p-5 md:p-6 rounded-2xl shadow-md relative overflow-hidden">
              <div className="absolute top-0 right-0 opacity-10 text-7xl md:text-9xl transform translate-x-10 translate-y-[-20%] font-extrabold">
                CAREERS
              </div>
              <h3 className="text-lg md:text-xl font-bold relative z-10">
                Gabung Bersama Tim Hebat Kami
              </h3>
              <p className="text-xs text-indigo-200 mt-1 max-w-xl relative z-10">
                Isilah berkas lamaran di bawah untuk menguji alur pipeline
                otomatis.
              </p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {activeOpenJobs.length === 0 ? (
                <p className="text-xs text-slate-400 col-span-1 md:col-span-2 text-center py-6">
                  Tidak ada lowongan aktif.
                </p>
              ) : (
                activeOpenJobs.map((j) => (
                  <div
                    key={j.id}
                    className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between hover:shadow-md transition-shadow"
                  >
                    <div>
                      <div className="flex items-start justify-between">
                        <h4 className="font-bold text-slate-900 text-sm pr-2">
                          {j.title}
                        </h4>
                        <span className="bg-indigo-50 text-indigo-700 text-[9px] font-bold px-2 py-0.5 rounded-md uppercase shrink-0">
                          {j.department}
                        </span>
                      </div>
                      <div className="flex flex-wrap gap-2 md:gap-4 text-[10px] text-slate-400 font-bold mt-2">
                        <span>📍 {j.location}</span>
                        <span>💼 {j.type}</span>
                        <span>💰 {j.salary}</span>
                      </div>
                      <p className="text-xs text-slate-600 font-medium mt-3 leading-relaxed line-clamp-3">
                        {j.description}
                      </p>
                    </div>
                    <div className="mt-5 pt-3 border-t border-slate-100 flex justify-end">
                      <button
                        onClick={() => setApplyJob(j)}
                        className="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white font-bold text-[11px] px-3.5 py-2.5 rounded-xl transition-all"
                      >
                        Lamar Sekarang
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>

            {applyJob && (
              <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade-in">
                <div className="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden border">
                  <div className="p-4 md:p-5 border-b flex justify-between items-center bg-slate-50">
                    <div>
                      <h4 className="font-bold text-slate-900 text-sm">
                        Kirim Lamaran
                      </h4>
                      <p className="text-[11px] text-indigo-600 font-bold mt-0.5">
                        {applyJob.title}
                      </p>
                    </div>
                    <button
                      onClick={() => setApplyJob(null)}
                      className="text-slate-400 hover:text-slate-700"
                    >
                      <Icons.Close />
                    </button>
                  </div>
                  <form
                    onSubmit={handleFormSubmitApplication}
                    className="p-4 md:p-5 space-y-4"
                  >
                    <div>
                      <label className="block text-[11px] font-bold text-slate-600 mb-1">
                        Nama Lengkap
                      </label>
                      <input
                        name="cand_name"
                        required
                        className="w-full border p-2 rounded-xl text-xs outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-600 mb-1">
                        Email Aktif
                      </label>
                      <input
                        type="email"
                        name="cand_email"
                        required
                        className="w-full border p-2 rounded-xl text-xs outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-600 mb-1">
                        Nomor WA
                      </label>
                      <input
                        name="cand_phone"
                        required
                        className="w-full border p-2 rounded-xl text-xs outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div className="bg-slate-50 p-3 rounded-xl border border-dashed text-center text-[10px] text-slate-400 font-medium">
                      📎 Resume Dibuat Otomatis
                    </div>
                    <div className="pt-2 flex justify-end gap-2">
                      <button
                        type="button"
                        onClick={() => setApplyJob(null)}
                        className="px-4 py-2 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-xl"
                      >
                        Batal
                      </button>
                      <button
                        type="submit"
                        className="px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md"
                      >
                        Kirim Lamaran
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ==========================================
      // 7. DIALOG COMPONENT: JOB ADD/EDIT FORM
      // ==========================================
      function JobFormModal({
        modal,
        setJobModal,
        jobs,
        setJobs,
        triggerToast,
        addActivity,
      }) {
        const isEdit = modal.mode === "edit";
        const [title, setTitle] = useState(isEdit ? modal.data.title : "");
        const [dept, setDept] = useState(
          isEdit ? modal.data.department : "Engineering",
        );
        const [type, setType] = useState(
          isEdit ? modal.data.type : "Full-time",
        );
        const [loc, setLoc] = useState(
          isEdit ? modal.data.location : "Jakarta (Hybrid)",
        );
        const [exp, setExp] = useState(
          isEdit ? modal.data.experience : "Mid-Level",
        );
        const [salary, setSalary] = useState(
          isEdit ? modal.data.salary : "Rp 10M - 15M",
        );
        const [status, setStatus] = useState(
          isEdit ? modal.data.status : "Active",
        );
        const [desc, setDesc] = useState(isEdit ? modal.data.description : "");

        const triggerAIGenerator = () => {
          if (!title) {
            alert("Isi Judul Pekerjaan dulu!");
            return;
          }
          setDesc(
            `[AI Generated Description]:\nTugas mencakup analisis teknis dan implementasi produk untuk posisi ${title}.`,
          );
          triggerToast("AI berhasil generate deskripsi!");
        };

        const handleSubmitForm = (e) => {
          e.preventDefault();
          if (isEdit) {
            setJobs(
              jobs.map((j) =>
                j.id === modal.data.id
                  ? {
                      ...j,
                      title,
                      department: dept,
                      type,
                      location: loc,
                      experience: exp,
                      salary,
                      status,
                      description: desc,
                    }
                  : j,
              ),
            );
            triggerToast("Perubahan disimpan.");
          } else {
            setJobs([
              {
                id: Date.now(),
                title,
                department: dept,
                type,
                location: loc,
                experience: exp,
                salary,
                status,
                description: desc,
                applicants: 0,
                date: new Date().toISOString().split("T")[0],
              },
              ...jobs,
            ]);
            triggerToast("Lowongan dipublikasikan!");
          }
          setJobModal({ open: false, mode: "add", data: null });
        };

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-3 md:p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden border border-slate-100 flex flex-col max-h-[90vh] md:max-h-[85vh]">
              <div className="p-4 md:p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider truncate pr-2">
                  {isEdit ? `Edit JOB-${modal.data.id}` : "Buka Lowongan"}
                </h3>
                <button
                  onClick={() =>
                    setJobModal({ open: false, mode: "add", data: null })
                  }
                  className="text-slate-400 hover:text-slate-700 shrink-0"
                >
                  <Icons.Close />
                </button>
              </div>
              <form
                onSubmit={handleSubmitForm}
                className="p-4 md:p-6 space-y-4 overflow-y-auto custom-scroll flex-1 bg-slate-50/50"
              >
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Judul Pekerjaan
                    </label>
                    <input
                      type="text"
                      required
                      value={title}
                      onChange={(e) => setTitle(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Departemen
                    </label>
                    <select
                      value={dept}
                      onChange={(e) => setDept(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs bg-white font-medium outline-none"
                    >
                      <option value="Engineering">Engineering</option>
                      <option value="Product">Product</option>
                      <option value="Design">Design</option>
                    </select>
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Tipe
                    </label>
                    <select
                      value={type}
                      onChange={(e) => setType(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs bg-white font-medium outline-none"
                    >
                      <option value="Full-time">Full-time</option>
                      <option value="Contract">Contract</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Lokasi
                    </label>
                    <input
                      type="text"
                      required
                      value={loc}
                      onChange={(e) => setLoc(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs outline-none font-medium"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Gaji
                    </label>
                    <input
                      type="text"
                      required
                      value={salary}
                      onChange={(e) => setSalary(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs outline-none font-medium"
                    />
                  </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Pengalaman
                    </label>
                    <input
                      type="text"
                      required
                      value={exp}
                      onChange={(e) => setExp(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs outline-none font-medium"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Status
                    </label>
                    <select
                      value={status}
                      onChange={(e) => setStatus(e.target.value)}
                      className="w-full border border-slate-200 p-2 rounded-xl text-xs bg-white font-medium outline-none"
                    >
                      <option value="Active">Aktif</option>
                      <option value="Closed">Tutup</option>
                    </select>
                  </div>
                </div>
                <div>
                  <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-1">
                    <label className="text-[11px] font-bold text-slate-600">
                      Deskripsi Pekerjaan
                    </label>
                    <button
                      type="button"
                      onClick={triggerAIGenerator}
                      className="bg-indigo-50 text-indigo-700 text-[10px] font-bold px-2.5 py-1.5 sm:py-1 rounded-lg border border-indigo-200 flex items-center justify-center gap-1 w-full sm:w-auto"
                    >
                      <Icons.Sparkles /> Generate Otomatis (AI)
                    </button>
                  </div>
                  <textarea
                    rows="4"
                    required
                    value={desc}
                    onChange={(e) => setDesc(e.target.value)}
                    className="w-full border border-slate-200 p-3 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500 font-medium font-mono"
                  />
                </div>
                <div className="pt-4 border-t border-slate-100 flex justify-end gap-2.5 bg-white -mx-4 -mb-4 md:-mx-6 md:-mb-6 p-4 md:p-4 mt-auto">
                  <button
                    type="button"
                    onClick={() =>
                      setJobModal({ open: false, mode: "add", data: null })
                    }
                    className="px-5 py-2 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-xl"
                  >
                    Batal
                  </button>
                  <button
                    type="submit"
                    className="px-5 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md"
                  >
                    {isEdit ? "Simpan" : "Publikasikan"}
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      // ==========================================
      // 8. DIALOG COMPONENT: CANDIDATE DETAIL
      // ==========================================
      function CandidateDetailModal({
        modal,
        setCandModal,
        candidates,
        setCandidates,
        setSchedModal,
        triggerToast,
      }) {
        const cand = modal.data;
        const [newNote, setNewNote] = useState("");
        const [emailTemplateOpen, setEmailTemplateOpen] = useState(false);
        const [emailType, setEmailType] = useState("interview");

        const handleAddCommentNote = (e) => {
          e.preventDefault();
          if (!newNote.trim()) return;
          setCandidates(
            candidates.map((c) =>
              c.id === cand.id
                ? { ...c, notes: [...c.notes, `[Wildan F.]: ${newNote}`] }
                : c,
            ),
          );
          cand.notes.push(`[Wildan F.]: ${newNote}`);
          setNewNote("");
          triggerToast("Catatan ditambahkan.");
        };

        const simulatedEmailText =
          emailType === "interview"
            ? `Halo ${cand.name},\nKami mengundang Anda wawancara...`
            : `Halo ${cand.name},\nSelamat! Offering letter...`;

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-3 md:p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden border flex flex-col max-h-[90vh] md:max-h-[85vh]">
              <div className="p-4 md:p-6 border-b bg-slate-900 text-white flex justify-between items-start">
                <div className="flex items-center gap-3 md:gap-4">
                  <div className="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-indigo-600 font-extrabold text-sm flex items-center justify-center text-white shrink-0">
                    {cand.avatar}
                  </div>
                  <div>
                    <h3 className="text-sm md:text-base font-bold tracking-tight">
                      {cand.name}
                    </h3>
                    <p className="text-[10px] md:text-xs text-slate-400 font-medium mt-0.5">
                      {cand.role} •{" "}
                      <span className="text-indigo-400 font-bold">
                        Tahap {cand.stage}
                      </span>
                    </p>
                  </div>
                </div>
                <button
                  onClick={() => setCandModal({ open: false, data: null })}
                  className="text-slate-400 hover:text-white shrink-0"
                >
                  <Icons.Close />
                </button>
              </div>

              <div className="p-4 md:p-6 space-y-4 overflow-y-auto custom-scroll flex-1 bg-slate-50/50 text-xs">
                <div className="bg-white p-4 rounded-xl border border-slate-200/80 grid grid-cols-1 md:grid-cols-2 gap-3 font-medium text-slate-700">
                  <p className="flex items-center gap-2 truncate">
                    ✉️ <strong>Email:</strong>{" "}
                    <span className="text-slate-500 font-normal truncate">
                      {cand.email}
                    </span>
                  </p>
                  <p className="flex items-center gap-2">
                    📞 <strong>Telp:</strong>{" "}
                    <span className="text-slate-500 font-normal">
                      {cand.phone}
                    </span>
                  </p>
                  <p className="flex items-center gap-2">
                    📅 <strong>Melamar:</strong>{" "}
                    <span className="text-slate-500 font-normal">
                      {cand.appliedDate}
                    </span>
                  </p>
                </div>

                <div className="flex flex-col sm:flex-row gap-2 pt-1">
                  <button
                    onClick={() => {
                      setCandModal({ open: false, data: null });
                      setSchedModal({ open: true, candidate: cand });
                    }}
                    className="w-full sm:w-auto justify-center bg-amber-600 hover:bg-amber-700 text-white font-bold px-3 py-2.5 rounded-xl flex items-center gap-1.5 shadow-sm"
                  >
                    📅 Atur Jadwal
                  </button>
                  <button
                    onClick={() => setEmailTemplateOpen(!emailTemplateOpen)}
                    className="w-full sm:w-auto justify-center bg-white border border-slate-300 hover:bg-slate-100 font-bold px-3 py-2.5 rounded-xl text-slate-700 flex items-center gap-1.5"
                  >
                    ✉️ Email Otomatis
                  </button>
                </div>

                {emailTemplateOpen && (
                  <div className="bg-indigo-50 border border-indigo-200 p-4 rounded-xl space-y-3 animate-fade-in">
                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
                      <span className="font-bold text-indigo-950 text-[10px] md:text-xs">
                        Template Email
                      </span>
                      <div className="flex gap-2">
                        <button
                          onClick={() => setEmailType("interview")}
                          className={`px-2 py-1 font-bold rounded text-[10px] flex-1 sm:flex-none ${emailType === "interview" ? "bg-indigo-600 text-white" : "bg-white text-slate-600"}`}
                        >
                          Undangan
                        </button>
                        <button
                          onClick={() => setEmailType("offer")}
                          className={`px-2 py-1 font-bold rounded text-[10px] flex-1 sm:flex-none ${emailType === "offer" ? "bg-indigo-600 text-white" : "bg-white text-slate-600"}`}
                        >
                          Offering
                        </button>
                      </div>
                    </div>
                    <textarea
                      rows="3"
                      readOnly
                      value={simulatedEmailText}
                      className="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-[11px] font-mono outline-none text-slate-700"
                    />
                    <div className="flex justify-end">
                      <button
                        onClick={() => {
                          setEmailTemplateOpen(false);
                          triggerToast("Email sukses terkirim!");
                        }}
                        className="bg-indigo-600 text-white font-bold px-3 py-1.5 rounded-lg w-full sm:w-auto"
                      >
                        Kirim Sekarang
                      </button>
                    </div>
                  </div>
                )}

                <div className="space-y-2">
                  <h4 className="font-bold text-slate-900 uppercase text-[10px] tracking-wider">
                    Catatan Evaluasi
                  </h4>
                  <div className="bg-white rounded-xl border border-slate-200/80 divide-y divide-slate-100 max-h-[160px] overflow-y-auto custom-scroll">
                    {cand.notes.map((note, index) => (
                      <div
                        key={index}
                        className="p-3 font-medium text-slate-700"
                      >
                        {note}
                      </div>
                    ))}
                  </div>
                </div>

                <form
                  onSubmit={handleAddCommentNote}
                  className="flex flex-col sm:flex-row gap-2 mt-auto"
                >
                  <input
                    type="text"
                    required
                    placeholder="Tambahkan feedback..."
                    value={newNote}
                    onChange={(e) => setNewNote(e.target.value)}
                    className="flex-1 border border-slate-200 p-2 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500 font-medium w-full"
                  />
                  <button
                    type="submit"
                    className="w-full sm:w-auto bg-slate-900 hover:bg-slate-800 text-white font-bold px-4 py-2.5 sm:py-2 rounded-xl"
                  >
                    Simpan
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 9. DIALOG COMPONENT: SCHEDULE INTERVIEW
      // ==========================================
      function ScheduleInterviewModal({
        modal,
        setSchedModal,
        interviews,
        setInterviews,
        triggerToast,
      }) {
        const cand = modal.candidate;

        const handleFormSubmitSchedule = (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          setInterviews([
            {
              id: Date.now(),
              candidateId: cand.id,
              candidateName: cand.name,
              jobTitle: cand.role,
              date: fd.get("inv_date"),
              time: fd.get("inv_time"),
              interviewer: fd.get("inv_user"),
              type: fd.get("inv_format"),
              status: "Scheduled",
            },
            ...interviews,
          ]);
          triggerToast(`Jadwal untuk ${cand.name} berhasil dibuat!`);
          setSchedModal({ open: false, candidate: null });
        };

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden border">
              <div className="p-4 md:p-5 border-b flex justify-between items-center bg-slate-50">
                <h4 className="font-bold text-slate-900 text-xs uppercase tracking-wider">
                  Atur Jadwal
                </h4>
                <button
                  onClick={() =>
                    setSchedModal({ open: false, candidate: null })
                  }
                  className="text-slate-400"
                >
                  <Icons.Close />
                </button>
              </div>
              <form
                onSubmit={handleFormSubmitSchedule}
                className="p-4 md:p-5 space-y-4 text-xs"
              >
                <div>
                  <label className="block text-[11px] font-bold text-slate-600 mb-1">
                    Kandidat
                  </label>
                  <input
                    type="text"
                    readOnly
                    value={cand.name}
                    className="w-full border p-2 rounded-xl bg-slate-100 font-bold text-slate-800"
                  />
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Tanggal
                    </label>
                    <input
                      type="date"
                      required
                      name="inv_date"
                      className="w-full border p-2 rounded-xl"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Waktu
                    </label>
                    <input
                      type="time"
                      required
                      name="inv_time"
                      className="w-full border p-2 rounded-xl"
                    />
                  </div>
                </div>
                <div>
                  <label className="block text-[11px] font-bold text-slate-600 mb-1">
                    Pewawancara
                  </label>
                  <input
                    type="text"
                    required
                    name="inv_user"
                    defaultValue="HR Manager"
                    className="w-full border p-2 rounded-xl"
                  />
                </div>
                <div>
                  <label className="block text-[11px] font-bold text-slate-600 mb-1">
                    Format
                  </label>
                  <select
                    name="inv_format"
                    className="w-full border p-2 rounded-xl bg-white"
                  >
                    <option value="Virtual">Virtual Online</option>
                    <option value="In-Person">Tatap Muka</option>
                  </select>
                </div>
                <div className="pt-2 flex justify-end gap-2">
                  <button
                    type="button"
                    onClick={() =>
                      setSchedModal({ open: false, candidate: null })
                    }
                    className="px-4 py-2 text-slate-500 font-bold hover:bg-slate-100 rounded-xl"
                  >
                    Batal
                  </button>
                  <button
                    type="submit"
                    className="px-4 py-2 text-white bg-indigo-600 rounded-xl shadow-md"
                  >
                    Simpan & Undang
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      // ==========================================
      // 10. UTILS REUSABLE SIDEBAR LINK WRAPPER
      // ==========================================
      function SidebarItem({ icon, label, active, onClick }) {
        return (
          <button
            onClick={onClick}
            className={`w-full flex items-center space-x-3 px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${
              active
                ? "bg-indigo-600 text-white shadow-lg shadow-indigo-600/20"
                : "text-slate-400 hover:bg-slate-800 hover:text-white"
            }`}
          >
            {icon}
            <span>{label}</span>
          </button>
        );
      }

      const container = document.getElementById("root");
      const rootSystem = ReactDOM.createRoot(container);
      rootSystem.render(<App />);
    </script>
  </body>
</html>
