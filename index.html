            return `Halo ${cand.name},\n\nTerima kasih telah melamar di RecruitSync. Kami mengundang Anda menghadiri sesi wawancara teknis. Mohon pilih slot waktu pada kalender terlampir.\n\nSalam,\nTim HR`;
          }
          return `Halo ${cand.name},\n\nSelamat! Kami sangat terkesan dengan portofolio Anda dan bermaksud menawarkan posisi resmi bergabung bersama kami. Surat Penawaran Kerja (Offering Letter) formal terlampir.\n\nSalam,\nWildan Fahmi`;
        }, [emailType, cand]);

        const handleSendSimulatedEmailAction = () => {
          setEmailTemplateOpen(false);
          triggerToast(
            `Email Otomatis (${emailType.toUpperCase()}) sukses terkirim ke ${cand.email}!`,
          );
        };

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden border flex flex-col max-h-[85vh]">
              {/* Header Identity banner card */}
              <div className="p-6 border-b bg-slate-900 text-white flex justify-between items-start">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl bg-indigo-600 font-extrabold text-sm flex items-center justify-center text-white shadow-md">
                    {cand.avatar}
                  </div>
                  <div>
                    <h3 className="text-base font-bold tracking-tight">
                      {cand.name}
                    </h3>
                    <p className="text-xs text-slate-400 font-medium mt-0.5">
                      {cand.role} •{" "}
                      <span className="text-indigo-400 font-bold">
                        Tahap {cand.stage}
                      </span>
                    </p>
                  </div>
                </div>
                <button
                  onClick={() => setCandModal({ open: false, data: null })}
                  className="text-slate-400 hover:text-white transition-colors"
                >
                  <Icons.Close />
                </button>
              </div>

              {/* Main Tabs Body Contents layout splits */}
              <div className="p-6 space-y-5 overflow-y-auto custom-scroll flex-1 bg-slate-50/50 text-xs">
                {/* Profile Bio metadata grid links */}
                <div className="bg-white p-4 rounded-xl border border-slate-200/80 grid grid-cols-1 md:grid-cols-2 gap-3 font-medium text-slate-700">
                  <p className="flex items-center gap-2">
                    ✉️ <strong>Email:</strong>{" "}
                    <span className="text-slate-500 font-normal">
                      {cand.email}
                    </span>
                  </p>
                  <p className="flex items-center gap-2">
                    📞 <strong>Telepon:</strong>{" "}
                    <span className="text-slate-500 font-normal">
                      {cand.phone}
                    </span>
                  </p>
                  <p className="flex items-center gap-2">
                    📅 <strong>Tanggal Melamar:</strong>{" "}
                    <span className="text-slate-500 font-normal">
                      {cand.appliedDate}
                    </span>
                  </p>
                  <p className="flex items-center gap-2">
                    📄 <strong>Resume Dokumen:</strong>{" "}
                    <span className="text-indigo-600 hover:underline cursor-pointer font-bold">
                      Lihat CV_Budi_Santoso.pdf
                    </span>
                  </p>
                </div>

                {/* Action Operations Command Automation Row buttons */}
                <div className="flex flex-wrap gap-2 pt-1">
                  <button
                    onClick={() => {
                      setCandModal({ open: false, data: null });
                      setSchedModal({ open: true, candidate: cand });
                    }}
                    className="bg-amber-600 hover:bg-amber-700 text-white font-bold px-3 py-2 rounded-xl flex items-center gap-1.5 shadow-sm transition-all"
                  >
                    📅 Hubungkan Jadwal Wawancara
                  </button>
                  <button
                    onClick={() => {
                      setEmailTemplateOpen(!emailTemplateOpen);
                    }}
                    className="bg-white border border-slate-300 hover:bg-slate-100 font-bold px-3 py-2 rounded-xl text-slate-700 flex items-center gap-1.5 transition-all"
                  >
                    ✉️ Kirim Email Otomatis (Automation Hub)
                  </button>
                </div>

                {/* Email Trigger Panel (Sub-Drawer toggled context logic) */}
                {emailTemplateOpen && (
                  <div className="bg-indigo-50 border border-indigo-200 p-4 rounded-xl space-y-3 animate-fade-in">
                    <div className="flex justify-between items-center">
                      <span className="font-bold text-indigo-950">
                        Draft Template Email Otomatis Berdasarkan Trigger
                      </span>
                      <div className="flex gap-2">
                        <button
                          type="button"
                          onClick={() => setEmailType("interview")}
                          className={`px-2 py-0.5 font-bold rounded text-[10px] ${emailType === "interview" ? "bg-indigo-600 text-white" : "bg-white text-slate-600"}`}
                        >
                          Undangan Wawancara
                        </button>
                        <button
                          type="button"
                          onClick={() => setEmailType("offer")}
                          className={`px-2 py-0.5 font-bold rounded text-[10px] ${emailType === "offer" ? "bg-indigo-600 text-white" : "bg-white text-slate-600"}`}
                        >
                          Offering Letter
                        </button>
                      </div>
                    </div>
                    <textarea
                      rows="3"
                      readOnly
                      value={simulatedEmailText}
                      className="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-[11px] font-mono outline-none text-slate-700"
                    />
                    <div className="flex justify-end">
                      <button
                        type="button"
                        onClick={handleSendSimulatedEmailAction}
                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-lg"
                      >
                        Kirim Email Sekarang
                      </button>
                    </div>
                  </div>
                )}

                {/* Chronological Evaluator Internal Notes List Section */}
                <div className="space-y-2">
                  <h4 className="font-bold text-slate-900 uppercase text-[10px] tracking-wider">
                    Catatan Evaluasi Tim Reviewer
                  </h4>
                  <div className="bg-white rounded-xl border border-slate-200/80 divide-y divide-slate-100 max-h-[160px] overflow-y-auto custom-scroll">
                    {cand.notes.map((note, index) => (
                      <div
                        key={index}
                        className="p-3 font-medium text-slate-700 leading-relaxed"
                      >
                        {note}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Form Input comment logger */}
                <form onSubmit={handleAddCommentNote} className="flex gap-2">
                  <input
                    type="text"
                    required
                    placeholder="Tambahkan feedback / hasil review teknis..."
                    value={newNote}
                    onChange={(e) => setNewNote(e.target.value)}
                    className="flex-1 border border-slate-200 p-2 rounded-xl outline-none focus:bg-white focus:ring-1 focus:ring-indigo-500 font-medium"
                  />
                  <button
                    type="submit"
                    className="bg-slate-900 hover:bg-slate-800 text-white font-bold px-4 rounded-xl"
                  >
                    Simpan Note
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 9. DIALOG COMPONENT: SCHEDULE INTERVIEW POPUP
      // ==========================================
      function ScheduleInterviewModal({
        modal,
        setSchedModal,
        interviews,
        setInterviews,
        triggerToast,
      }) {
        const cand = modal.candidate;

        const handleFormSubmitSchedule = (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);

          const newInv = {
            id: Date.now(),
            candidateId: cand.id,
            candidateName: cand.name,
            jobTitle: cand.role,
            date: fd.get("inv_date"),
            time: fd.get("inv_time"),
            interviewer: fd.get("inv_user"),
            type: fd.get("inv_format"),
            status: "Scheduled",
          };

          setInterviews([newInv, ...interviews]);
          triggerToast(`Sukses membuat jadwal wawancara untuk ${cand.name}!`);
          setSchedModal({ open: false, candidate: null });
        };

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden border">
              <div className="p-5 border-b flex justify-between items-center bg-slate-50">
                <h4 className="font-bold text-slate-900 text-xs uppercase tracking-wider">
                  Atur Jadwal Wawancara Baru
                </h4>
                <button
                  onClick={() =>
                    setSchedModal({ open: false, candidate: null })
                  }
                  className="text-slate-400 hover:text-slate-700"
                >
                  <Icons.Close />
                </button>
              </div>
              <form
                onSubmit={handleFormSubmitSchedule}
                className="p-5 space-y-4 text-xs"
              >
                <div>
                  <label className="block text-[11px] font-bold text-slate-600 mb-1">
                    Nama Kandidat Terpilih
                  </label>
                  <input
                    type="text"
                    readOnly
                    value={cand.name}
                    className="w-full border p-2 rounded-xl bg-slate-100 font-bold text-slate-800 outline-none"
                  />
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Tanggal
                    </label>
                    <input
                      type="date"
                      required
                      name="inv_date"
                      defaultValue="2026-06-01"
                      className="w-full border p-2 rounded-xl outline-none font-medium"
                    />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-600 mb-1">
                      Waktu Sesi (WIB)
                    </label>
                    <input
                      type="time"
                      required
                      name="inv_time"
                      defaultValue="13:00"
                      className="w-full border p-2 rounded-xl outline-none font-medium"
                    />
                  </div>
                </div>
                <div>
                  <label className="block text-[11px] font-bold text-slate-600 mb-1">
                    User Tim Penilai (Interviewer)
                  </label>
                  <input
                    type="text"
                    required
                    name="inv_user"
                    placeholder="Contoh: Wildan (Tech Lead)"
                    defaultValue="Wildan (HR Manager)"
                    className="w-full border p-2 rounded-xl outline-none font-medium"
                  />
                </div>
                <div>
                  <label className="block text-[11px] font-bold text-slate-600 mb-1">
                    Format Pertemuan
                  </label>
                  <select
                    name="inv_format"
                    className="w-full border p-2 rounded-xl bg-white outline-none font-medium"
                  >
                    <option value="Virtual">
                      Google Meet (Virtual Online)
                    </option>
                    <option value="In-Person">
                      On-Site Office (Tatap Muka)
                    </option>
                  </select>
                </div>

                <div className="pt-2 flex justify-end gap-2">
                  <button
                    type="button"
                    onClick={() =>
                      setSchedModal({ open: false, candidate: null })
                    }
                    className="px-4 py-2 text-slate-500 font-bold hover:bg-slate-100 rounded-xl"
                  >
                    Batal
                  </button>
                  <button
                    type="submit"
                    className="px-4 py-2 text-white bg-indigo-600 hover:bg-indigo-700 font-bold rounded-xl shadow-md"
                  >
                    Simpan & Undang
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      // ==========================================
      // 10. UTILS REUSABLE SIDEBAR LINK WRAPPER
      // ==========================================
      function SidebarItem({ icon, label, active, onClick }) {
        return (
          <button
            onClick={onClick}
            className={`w-full flex items-center space-x-3 px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${
              active
                ? "bg-indigo-600 text-white shadow-lg shadow-indigo-600/20"
                : "text-slate-400 hover:bg-slate-800 hover:text-white"
            }`}
          >
            {icon}
            <span>{label}</span>
          </button>
        );
      }

      // Final Assembly DOM Mounting execution
      const container = document.getElementById("root");
      const rootSystem = ReactDOM.createRoot(container);
      rootSystem.render(<App />);
    </script>
  </body>
</html>
